Central bank independence from political pressure is considered essential for credibility. An independent central bank can raise rates to fight inflation even if it is politically unpopular before elections. Transparency — communicating clearly about the central bank's objectives, strategies, and decisions — reinforces credibility by reducing uncertainty and allowing markets to form accurate expectations about future policy.`,
      note:"The central bank's three key attributes for effective monetary policy are independence, credibility, and transparency. Independence prevents short-term political pressures from overriding long-term price stability goals. Credibility anchors inflation expectations. Transparency reduces policy uncertainty. All three are interrelated — a credible, transparent central bank is typically more independent in practice.",
      definition:"Fiat Money: Money that is not backed by or convertible into any commodity; its value derives from government decree and general acceptance as a medium of exchange, store of value, and unit of account; central banks are the monopoly suppliers of fiat currency.",
      example:"Northern Rock bank run (2007): When news broke that Northern Rock sought emergency Bank of England support on September 12, 2007, depositors queued outside branches on September 14, withdrawing approximately GBP 1 billion (5% of deposits) in one day. GBP 1 billion more was withdrawn over the following two days. The government's guarantee of all deposits on September 17 stabilized the situation. The bank was ultimately nationalized, illustrating how lender-of-last-resort support requires credible deposit guarantees to prevent runs."
    },
    e4b:{
      body:`The three primary tools of monetary policy are: (1) open market operations (OMOs), (2) the central bank's policy rate, and (3) reserve requirements. Open market operations involve the central bank buying government securities (expansionary: increases bank reserves and money supply) or selling them (contractionary: reduces reserves). OMOs are the most frequently used tool in developed markets and directly influence short-term interbank interest rates (e.g., the federal funds rate in the US).

The policy rate (also called the refinancing rate, discount rate, or repo rate depending on the country) is the rate at which commercial banks borrow from the central bank. Lowering the policy rate makes borrowing cheaper, encouraging banks to lend more and businesses to invest more — expansionary. Raising the policy rate has the opposite contractionary effect. Reserve requirements specify the minimum fraction of deposits that banks must hold as reserves. Lowering reserve requirements allows banks to create more money through lending (expansionary). Most developed central banks rarely use reserve requirements as an active monetary policy tool.

The transmission mechanism describes how changes in the policy rate propagate through the economy to affect inflation, output, and employment. Key channels include: (1) Short-term interest rates: a lower policy rate reduces short-term borrowing costs for firms and households. (2) Long-term interest rates: lower short-term rates typically compress long-term yields, reducing mortgage costs and corporate borrowing rates. (3) Asset prices: lower rates boost equity valuations (present value of future cash flows rises) and real estate prices, creating a wealth effect. (4) Exchange rates: lower domestic rates reduce capital inflows, weakening the currency — stimulating exports and reducing imports. (5) Expectations channel: forward guidance about future rate paths anchors long-term expectations.

Inflation targeting is the dominant monetary policy framework in developed markets. Central banks set an explicit numerical inflation target (typically 2%), communicate their forecasts, and adjust the policy rate to keep inflation near the target. Alternative frameworks include exchange rate targeting, in which the central bank fixes or manages its currency relative to a foreign currency. Exchange rate targeting is common among emerging market economies but sacrifices independent monetary policy — the country must match the anchor country's interest rates to maintain the peg.`,
      note:"The transmission mechanism works through multiple channels simultaneously. The most important for the CFA exam are: interest rate channel (borrowing costs), asset price channel (wealth effect on consumption), and exchange rate channel (competitiveness). Lower rates → weaker currency → higher net exports is particularly important for open economies. Full impact on inflation takes 12-24 months.",
      definition:"Open Market Operations (OMO): The purchase or sale of government securities by the central bank in the open market to influence the level of bank reserves and short-term interest rates; buying securities is expansionary (injects reserves), selling is contractionary (removes reserves).",
      example:"Fed funds rate transmission example: When the Federal Reserve cut the federal funds rate target from 5.25% to near 0% (2007-2008), the transmission worked as follows: Short-term borrowing costs fell immediately. Mortgage rates declined from ~6.5% to ~4.5%, stimulating refinancing activity. The S&P 500 eventually recovered as lower discount rates raised equity valuations. The USD weakened against major currencies, boosting US export competitiveness. However, the full impact on inflation took approximately 18-24 months to fully manifest."
    },
    e4c:{
      body:`Limitations of monetary policy include: (1) the zero lower bound (ZLB) problem — nominal interest rates cannot be negative (or significantly so), limiting the central bank's ability to stimulate when the policy rate is already near zero. The Bank of Japan wrestled with this from the 1990s onward. (2) The central bank cannot control the amount households deposit in banks or the willingness of banks to lend — the money multiplier can fall sharply in crises when banks hoard reserves. (3) Uncertainty about transmission lags (12-24 months) means the central bank must act on forecasts, not current conditions.

Monetary and fiscal policy interact in important ways. Both can affect aggregate demand, but through different channels. Monetary policy primarily affects investment and consumption through interest rates; fiscal policy directly injects or withdraws spending. Coordinated use can be powerful — as in the 2008-2009 response where central banks cut rates to near zero while governments ran large fiscal deficits. Uncoordinated policy (fiscal expansion combined with monetary tightening) creates tensions: the central bank raises rates to offset inflationary fiscal spending, crowding out private investment.

The neutral interest rate is the policy rate that neither stimulates nor restricts the economy. It equals the sum of the real trend rate of economic growth and the target inflation rate. If the policy rate is below the neutral rate, monetary policy is expansionary. If above the neutral rate, policy is contractionary. This framework helps investors assess the true stance of monetary policy: a 3% rate in a 2%-inflation, 2%-growth economy (neutral rate = 4%) is actually expansionary.

Quantitative easing (QE) was developed to address the ZLB problem. When policy rates are near zero, the central bank purchases long-term assets (government bonds, mortgage-backed securities) to inject reserves and compress long-term yields. QE works through the portfolio balance channel: by purchasing safe assets, the central bank pushes investors into riskier alternatives (equities, corporate bonds), lowering risk premiums. QE's effectiveness also depends on bank willingness to deploy excess reserves.`,
      note:"A key limitation of monetary policy is that the central bank can lower rates but cannot force banks to lend or households to borrow (the 'pushing on a string' problem). This was evident in Japan's experience with zero rates and QE. To assess monetary policy stance, compare the policy rate to the neutral rate: neutral rate = real trend growth + inflation target.",
      definition:"Inflation Targeting: A monetary policy framework in which the central bank announces an explicit numerical inflation target, uses its policy rate and communication to keep actual inflation near the target, and is held accountable for achieving the target; relies on anchoring long-run inflation expectations.",
      example:"Bank of Japan zero lower bound: Japan lowered its policy rate to near zero in the late 1990s and introduced Quantitative Easing (QE) in 2001 — the first major central bank to do so — buying government bonds to inject reserves when rate cuts were ineffective. Despite massive QE, deflation and low growth persisted through the 2000s. The 'liquidity trap' meant that even with near-zero rates, banks were unwilling to lend and firms were unwilling to invest due to weak demand expectations."
    }
  },
  flashcards:[
    {q:"What are the three primary tools of monetary policy and how does each work?",a:"1) Open market operations (OMOs): Central bank buys securities (expansionary — increases reserves/money supply) or sells (contractionary — reduces reserves). 2) Policy rate: Rate at which banks borrow from the central bank; lowering stimulates lending and investment; raising restricts credit. 3) Reserve requirements: Minimum fraction of deposits held as reserves; lowering allows more lending (expansionary); raising restricts it. OMOs are used most frequently in developed markets."},
    {q:"Describe the monetary policy transmission mechanism and its key channels.",a:"Policy rate change → (1) Short-term interest rates change immediately. (2) Long-term rates typically follow. (3) Asset prices rise/fall as discount rates change (wealth effect). (4) Exchange rate adjusts: lower domestic rates → currency weakens → exports more competitive (trade channel). (5) Expectations channel: forward guidance shifts future rate expectations. Full impact on inflation takes 12-24 months. In credit crises, transmission can be impaired if banks hoard reserves."},
    {q:"What are the three qualities of an effective central bank?",a:"1) Independence: Freedom from short-term political pressure to make decisions based on economic fundamentals; allows raising rates to fight inflation even before elections. 2) Credibility: Public belief that the central bank will achieve its objectives; anchors inflation expectations. 3) Transparency: Clear communication of objectives, forecasts, and decisions; reduces uncertainty and allows markets to predict policy accurately."},
    {q:"What is the zero lower bound (ZLB) and how have central banks responded to it?",a:"The ZLB is the constraint that nominal interest rates cannot be cut below approximately 0%, limiting conventional monetary stimulus when rates are already near zero. Responses: (1) Quantitative easing (QE) — buying longer-term assets to inject reserves and compress long-term yields. (2) Negative interest rates — charge banks for holding excess reserves. (3) Forward guidance — committing to keeping rates at zero for extended periods. (4) Yield curve control (Bank of Japan) — targeting specific yields on longer-term bonds."},
    {q:"What is exchange rate targeting and what are its key advantages and disadvantages?",a:"Exchange rate targeting: central bank pegs or manages its currency relative to an anchor currency (usually USD). Advantages: imports credibility from anchor country, reduces exchange rate volatility, anchors inflation expectations. Disadvantages: sacrifices independent monetary policy (must match anchor country rates); cannot adjust rates for domestic conditions; creates vulnerability to speculative attacks if fundamentals diverge; can create large currency crises (e.g., 1997 Asia, 1994 Mexico)."},
    {q:"How is the neutral interest rate determined and how is it used to assess monetary policy stance?",a:"Neutral interest rate = real trend rate of economic growth + central bank's target inflation rate. If the policy rate is BELOW the neutral rate, monetary policy is EXPANSIONARY (stimulating). If ABOVE, policy is CONTRACTIONARY (restricting). Example: if real trend growth = 2% and inflation target = 2%, neutral rate = 4%. A policy rate of 3% is expansionary; 5% is contractionary. This framework goes beyond simply looking at whether the rate is rising or falling."}
  ],
  questions:[
    "The central bank of a country with an explicit 2% inflation target observes that inflation has risen to 4%. Under an inflation-targeting framework, the central bank would most likely:\n\nA) Increase government spending to redistribute income\nB) Raise the policy rate to reduce aggregate demand and inflation\nC) Lower reserve requirements to stimulate bank lending\nD) Devalue the currency to improve export competitiveness\n\nAnswer: B — Under inflation targeting, the central bank raises the policy rate when inflation exceeds the target, transmitting through higher borrowing costs to reduce consumption and investment, ultimately bringing inflation back toward 2%. Choice A (government spending) is fiscal policy. Choice C (lower reserve requirements) is expansionary and would worsen inflation. Choice D would import inflation, worsening the problem.",
    "Which of the following best illustrates a limitation of monetary policy?\n\nA) The central bank can always force banks to lend reserves to households\nB) Policy rates can be cut to -5% without limit in a recession\nC) Even with near-zero interest rates, banks may be unwilling to lend and households may be reluctant to borrow\nD) Open market operations are ineffective because they do not change the money supply\n\nAnswer: C — A key limitation of monetary policy is that the central bank can inject reserves but cannot force banks to lend them out or households to borrow — the 'pushing on a string' problem. This was evident in Japan's experience. Choice B is wrong — negative rates below roughly -0.5% to -1% are generally considered impractical.",
    "An emerging market central bank pegs its currency to the US dollar. The US Federal Reserve raises rates by 200 basis points to fight US inflation, while the emerging market economy is experiencing a recession. What is the most likely implication for the emerging market?\n\nA) The emerging market central bank can cut rates independently to stimulate its recession\nB) The emerging market central bank must raise rates to defend the peg, worsening the recession\nC) The exchange rate peg automatically adjusts to reflect the interest rate differential\nD) The peg provides no benefit during this period because it imports inappropriate monetary policy\n\nAnswer: B — Under a currency peg, the central bank must match the anchor country's interest rates to prevent capital outflows and maintain the peg. If the anchor country raises rates, the pegged country must follow — even if its own economy is in recession.",
    "Central bank independence is considered important because:\n\nA) It allows the central bank to maximize employment regardless of inflation\nB) It protects monetary policy decisions from short-term political pressures that might prioritize growth before elections over long-term price stability\nC) It ensures fiscal and monetary policy are always coordinated\nD) It enables the central bank to ignore its inflation mandate during recessions\n\nAnswer: B — Central bank independence allows policymakers to take unpopular decisions (like raising rates to fight inflation before elections) without political interference. Credibility requires independence from governments that might prefer lower rates for short-term growth.",
    "The monetary transmission mechanism most directly impacts which of the following in the short run?\n\nA) The government's fiscal deficit\nB) Short-term interest rates and overnight bank borrowing costs\nC) Long-run potential GDP\nD) Corporate tax rates and after-tax profits\n\nAnswer: B — The monetary transmission mechanism begins with the policy rate change directly affecting short-term interbank borrowing rates (e.g., federal funds rate, LIBOR). This is the most immediate and direct effect. From there, it transmits to longer-term rates, asset prices, exchange rates, and eventually real activity and inflation over 12-24 months."
  ]
},
e5:{
  intro:"Learning Module 5 introduces geopolitics and its impact on the investment process. It covers the roles of state and non-state actors, the forces of globalization, the tools of geopolitics (national security, economic, and financial), and a framework for assessing geopolitical risk in terms of likelihood, velocity, and impact.",
  sections:{
    e5a:{
      body:`Geopolitics examines the interaction between geography, power, and international relations, and how this shapes economic and investment outcomes. Countries and non-state actors operate on two key axes: the degree of political cooperation (from full cooperation to complete non-cooperation) and the degree of economic globalization (from fully integrated to fully isolated/autarkic). These two axes define four archetypes: hegemony (global/regional leadership, non-cooperative), multilateralism (cooperative and globalized), autarky (self-sufficient, non-cooperative), and bilateralism (cooperative but not multilateral).

Autarky describes countries seeking political self-sufficiency with little external trade or finance. State enterprises control strategic industries. While autarky can initially accelerate economic development in some cases, it often results in poverty and stagnation (North Korea, Venezuela). Hegemonic countries use economic or political dominance to control resources and influence global affairs — often providing stability to the international system while serving their own interests. Multilateralism involves mutually beneficial trade and extensive rules harmonization; Singapore and Germany are examples.

Forces of globalization include free trade agreements, common markets, economic unions, and global supply chain integration. Globalization enables comparative advantage specialization, economies of scale, and technology transfer. The WTO facilitates multilateral trade rules; the IMF ensures monetary system stability; the World Bank supports development. Threats of globalization rollback include rising nationalism, income inequality concerns, national security interests (desire for supply chain independence), and political backlash against job displacement. Brexit — the UK's exit from the EU — is a prominent example of globalization rollback, shifting the UK from multilateralism toward bilateralism.

State actors are national governments; non-state actors include multinational corporations, NGOs, international organizations (WTO, IMF, World Bank), and terrorist or insurgent groups. Non-state actors increasingly shape geopolitical outcomes — multinational corporations lobbying for trade policies, media organizations influencing public opinion, and international institutions setting global rules. The relative power of state vs. non-state actors depends on the context; states retain the monopoly on legitimate use of force but increasingly compete with private actors for economic and informational influence.`,
      note:"For investment analysis, the key question is which quadrant of the cooperation-globalization framework a country occupies and whether it is stable or moving. A multilateral country becoming more autarkic (like the US under 'America First' policies) creates investment risks. Track the direction of movement, not just the current position.",
      definition:"Geopolitical Risk: The risk associated with political actions, instability, or conflicts between nations that can affect investment outcomes; categorized by type (event, exogenous, thematic), likelihood of occurrence, velocity (speed) of impact, and size/nature of impact on investor portfolios.",
      example:"Brexit as event risk: The UK's June 2016 EU referendum surprised most investors. Immediate market reaction: FTSE fell 3.1% on the first day; the British pound fell 8.1% (a catastrophic single-day currency decline); UK 10-year gilt yields fell 21%. Over 30 days, equities recovered (+6.2%) but GBP continued falling (-11.9%). Over one year: equities rose 17.1% (partly due to GBP weakness boosting multinational earnings), but GBP remained 14.5% below its pre-referendum level."
    },
    e5b:{
      body:`Geopolitical tools are categorized into three types: national security tools, economic tools, and financial tools. Each can be used cooperatively (facilitating flows between countries) or non-cooperatively (restricting flows). The nature of tools used by geopolitical actors indicates their position within the cooperation-globalization framework and signals potential shifts.

National security tools range from the extreme (armed conflict — direct disruption of physical infrastructure) to indirect tools such as espionage and military alliances. NATO is an example of a cooperative national security tool — a collective security arrangement that deters conflict and promotes stability among members. Armed conflict destroys physical capital and disrupts supply chains, with long-lasting investment impacts.

Economic tools include tariffs, quotas, voluntary export restraints (VERs), export subsidies, sanctions, nationalization of industries, and multilateral trade agreements. Non-cooperative economic tools restrict trade flows (tariffs, quotas, VERs, nationalization) while cooperative tools facilitate them (trade agreements, common markets, economic unions). A unique non-cooperative tool is nationalization — transferring private assets to state control, as Argentina did with YPF in 2012 to control fossil fuel revenues.

Geopolitical risk impacts investors through three dimensions: likelihood (probability of occurrence), velocity (speed of impact), and size/nature of impact. High-velocity risks (e.g., surprise events) manifest immediately in asset price volatility — commodity prices, exchange rates, equities, and bond yields react within days. Medium-velocity risks affect company revenues and costs over quarters. Low-velocity/thematic risks (climate change, migration patterns, rising populism) affect asset allocation and long-run valuations. Investors use scenario analysis, signpost monitoring, and stress testing to manage geopolitical risk.`,
      note:"Three types of geopolitical risk for the exam: (1) Event risk — known but uncertain probability (e.g., elections, referendums); (2) Exogenous risk — sudden and unanticipated (e.g., natural disasters, invasions); (3) Thematic risk — known and evolving over time (e.g., climate change, cyber threats, populism). High-velocity risks trigger immediate portfolio action (flight to quality); low-velocity risks inform long-term asset allocation.",
      definition:"Sanctions: Non-cooperative financial/economic geopolitical tools imposed by one or more countries on another, restricting trade, financial transactions, or access to technology to coerce behavioral change; examples include US/EU sanctions on Russia following the 2014 Crimea annexation.",
      example:"Equifax data breach (September 2017) as thematic/cyber risk: On the first day, Equifax stock fell 13.7% while the financial services industry rose 0.9%. Over 30 days, Equifax fell 22.0% while the industry rose 10.3%. This is a discrete, company-specific impact initially. Over time, the breach triggered broader impacts: all financial firms increased cybersecurity spending, regulators tightened data protection rules — transforming a discrete event into a thematic risk for the entire financial sector."
    }
  },
  flashcards:[
    {q:"What are the four archetypes of country behavior in the geopolitics framework?",a:"1) Autarky: Self-sufficient, non-cooperative, non-globalized; state controls strategic industries (e.g., North Korea). 2) Hegemony: Regional/global leader using political/economic dominance (e.g., some oil-exporting states). 3) Multilateralism: Cooperative and fully globalized; extensive trade and rules harmonization (e.g., Germany, Singapore). 4) Bilateralism: Cooperative but one-at-a-time agreements; between autarky and multilateralism. Countries move between quadrants — tracking direction is critical for risk analysis."},
    {q:"What are the three types of geopolitical tools and provide one cooperative and one non-cooperative example of each?",a:"1) National security: Cooperative — NATO; Non-cooperative — armed conflict, espionage. 2) Economic: Cooperative — WTO multilateral trade agreements; Non-cooperative — tariffs, quotas, VERs, nationalization. 3) Financial: Cooperative — free currency exchange, allowing foreign investment; Non-cooperative — sanctions, capital controls, restricting foreign investment. The type of tools used signals a country's position on the cooperation-globalization axes."},
    {q:"What are the three dimensions for assessing geopolitical risk?",a:"1) Likelihood: Probability the risk will occur; depends on country's stability and internal political pressures. 2) Velocity: Speed of impact on investor portfolios — high-velocity risks cause immediate market reactions; low-velocity risks affect asset allocation gradually. 3) Size and nature of impact: How large is the expected impact? Is it discrete (affects one firm/sector) or broad (macroeconomic)? Investors weigh all three to determine whether and how to respond."},
    {q:"Distinguish between event risk, exogenous risk, and thematic risk in geopolitics.",a:"Event risk: A known event with uncertain outcome (e.g., election, referendum). UK Brexit referendum: expected 'no' vote; 'yes' result created immediate high-velocity market disruption. Exogenous risk: Sudden, unanticipated shock with no advance warning (e.g., natural disaster, invasion). Japan's 2011 Fukushima nuclear disaster: Nikkei fell 6.2% on the first day. Thematic risk: Known risk that evolves slowly over years (e.g., climate change, cyber threats, demographic shifts). Affects long-run asset allocation."},
    {q:"How does a 'flight to safety' affect financial markets during a geopolitical crisis?",a:"Investors sell risky assets (equities, high-yield bonds, emerging market currencies) and buy safe-haven assets (US Treasuries, gold, Swiss Franc, Japanese Yen). This causes: equity prices to fall (equity risk premium rises), yields on safe bonds to fall (prices rise), gold prices to rise, and safe-haven currencies to appreciate. The magnitude of the flight to safety is proportional to the velocity and size of the geopolitical shock."}
  ],
  questions:[
    "A geopolitical analyst notes that Country A has recently increased tariffs on imports from Country B, restricted foreign investment from Country B, and nationalized a key export industry. Using the geopolitics framework, which archetype is Country A most likely moving toward?\n\nA) Multilateralism\nB) Bilateralism\nC) Hegemony\nD) Autarky\n\nAnswer: D — The combination of tariff increases (reducing trade openness), foreign investment restrictions (reducing financial openness), and nationalization of a key export industry are all non-cooperative, anti-globalization tools. This pattern of behavior is consistent with movement toward autarky — political and economic self-sufficiency with state control of strategic industries.",
    "The UK Brexit referendum result caused the British pound to fall 8.1% in one day. This type of geopolitical risk is best classified as:\n\nA) Thematic risk with low velocity\nB) Exogenous risk with medium velocity\nC) Event risk with high velocity\nD) Exogenous risk with high velocity\n\nAnswer: C — Brexit was an 'event risk' — a known event (the referendum) with an uncertain outcome. Most investors expected a 'remain' vote; the unexpected 'leave' result created a high-velocity impact. It was NOT exogenous (choices B, D) because the event was scheduled and anticipated — the surprise was the outcome, not the event itself.",
    "An investor using geopolitical signposts to monitor a portfolio would most usefully focus on which of the following as an early warning indicator of increased geopolitical risk in an emerging market?\n\nA) Quarterly GDP growth data from the government statistics office\nB) A pegged currency combined with rapidly declining export revenues\nC) Annual corporate earnings reports from major domestic companies\nD) Long-term demographic trends in the country\n\nAnswer: B — A pegged currency combined with rapidly declining export revenues is a strong signpost of potential exchange rate policy change and geopolitical risk. This combination creates pressure to devalue or abandon the peg, which can trigger financial crisis and political instability. This is an early warning that precedes official data releases.",
    "Which of the following is the most accurate description of the IMF's primary role in the international investment context?\n\nA) Providing development loans to the poorest countries to build infrastructure\nB) Setting global trade rules and resolving trade disputes between member nations\nC) Ensuring the stability of the international monetary system and exchange rate arrangements\nD) Providing direct equity investment in emerging market private firms\n\nAnswer: C — The IMF's primary mission is to ensure the stability of the international monetary system — the system of exchange rates and international payments. The IMF provides emergency financing to countries facing balance-of-payments crises. Choice A describes the World Bank. Choice B describes the WTO.",
    "Which of the following geopolitical scenarios would most likely cause an immediate high-velocity impact on commodity markets?\n\nA) A 10-year trend of gradually rising sea levels threatening coastal infrastructure\nB) A surprise armed conflict in a major oil-producing region\nC) A bilateral trade negotiation between two mid-sized economies expected to conclude in 18 months\nD) Gradual political polarization in a developed market democracy over five years\n\nAnswer: B — Armed conflict in a major oil-producing region is an exogenous risk with high velocity — oil supply disruptions immediately affect commodity prices, which then transmit to energy stocks, transportation costs, and inflation expectations within days. Choice A (sea level rise) is a low-velocity thematic risk. Choice C has low velocity and expected timing. Choice D is also thematic and slow-moving."
  ]
},
e6:{
  intro:"Learning Module 6 examines international trade — the benefits and costs of free trade, trade restrictions (tariffs, quotas, voluntary export restraints, and export subsidies) and their welfare effects, and the motivations for regional trading blocs including free trade areas, customs unions, common markets, and economic unions.",
  sections:{
    e6a:{
      body:`International trade benefits countries through several mechanisms. Gains from exchange occur when trade enables each country to export goods it produces more efficiently (at lower opportunity cost) and import goods that others produce more efficiently. This leads to specialization based on comparative advantage — not absolute advantage — maximizing global production possibilities. The Ricardian model of trade attributes comparative advantage to differences in technology (productivity); the Heckscher-Ohlin model attributes it to differences in factor endowments (land, labor, capital). Both predict that countries specialize in and export goods that use their abundant factors intensively.

Newer trade models emphasize gains from economies of scale (industries grow as markets expand, reducing average costs), greater product variety (consumers access differentiated products from many countries), and increased competition (foreign competition forces domestic firms to become more efficient and innovative). Germany imports Honda and Toyota cars from Japan while exporting VW and BMW — a pattern of intra-industry trade driven by consumer variety preferences and economies of scale, not comparative advantage differences.

The costs of international trade include potential income inequality and job displacement. As countries open to trade, resources reallocate — expanding export industries and contracting import-competing industries. Workers in contracting industries (e.g., US manufacturing) may be displaced and face permanent income losses if their industry-specific skills are devalued. The gains from trade are diffuse (spread across all consumers as lower prices) while the losses are concentrated (specific industries and workers). Trade increases overall welfare, but the winners could theoretically compensate the losers and still be better off — this redistribution rarely occurs in practice.

For investment analysis, trade liberalization and trade restrictions both have significant implications for firm profitability. Trade liberalization expands markets for exporters (positive for export-sector firms), intensifies competition for domestic-market firms facing import competition (negative), and reduces input costs for firms importing intermediate goods. Trade restriction changes — new tariffs or quotas — can rapidly affect supply chains, input costs, and pricing power.`,
      note:"Comparative advantage is based on relative, not absolute, efficiency — a country should specialize in goods where its opportunity cost is lowest, even if another country is absolutely more efficient at producing everything. This is a common exam concept: two countries both gain from trade when they specialize according to comparative advantage, even if one is better at producing both goods.",
      definition:"Comparative Advantage: A country's ability to produce a good or service at a lower opportunity cost relative to trading partners; the foundation of international trade theory — countries gain from specializing in and exporting goods with lowest relative opportunity cost, and importing goods with highest relative opportunity cost.",
      example:"Cottonland-Lumberland comparative advantage: The cost of producing cotton relative to lumber is lower in Cottonland than in Lumberland. Therefore, Cottonland has a comparative advantage in cotton and Lumberland in lumber. With trade, Cottonland expands cotton production and exports cotton to Lumberland; Lumberland expands lumber production and exports lumber to Cottonland. Both countries consume more of both goods than they could without trade."
    },
    e6b:{
      body:`Trade restrictions are government policies limiting the ability of domestic households and firms to trade freely. The primary types are tariffs, quotas, voluntary export restraints (VERs), and export subsidies. Governments impose trade restrictions to protect domestic industries from foreign competition, protect infant industries until they mature, preserve employment, ensure national security in strategic sectors, raise revenue, and retaliate against trading partners' restrictions.

Tariffs are taxes levied on imports. For a small country (price taker in world markets), a tariff of amount t raises the domestic price from the world price P* to P_t = P* + t. Effects: consumer surplus falls (areas A+B+C+D), producer surplus rises (area A), government gains tariff revenue (area C). Net welfare loss = B + D (deadweight loss). Area B represents production inefficiency (high-cost domestic producers who only enter market because of the tariff); area D represents consumption inefficiency (consumers who would have bought at P* but not at P_t).

Import quotas restrict the quantity of a good that can be imported. Effects are similar to tariffs — same areas A, B, C, D — but area C (equivalent to tariff revenue) becomes quota rents potentially captured by foreign exporters. If the importing country auctions import licenses, it can capture the rents; otherwise they accrue to foreign firms, making the welfare loss WORSE than an equivalent tariff (B+D+C vs. B+D under tariff). Voluntary export restraints (VERs) are like import quotas but imposed by the exporting country — all quota rents accrue to the exporter, maximizing the welfare loss for the importing country.

Export subsidies are payments by the government to domestic firms for each unit exported. They shift sales from domestic to foreign markets (raising domestic prices) and stimulate exports. Net welfare effects are negative: consumers pay higher prices domestically (loss of consumer surplus), and the government incurs fiscal costs. Countervailing duties — tariffs imposed by the importing country to offset subsidized exports — are the typical response. Agricultural subsidies in the EU and US have been a major source of trade friction with developing countries.`,
      note:"Comparing trade restrictions' welfare effects: Under a tariff — deadweight loss = B + D; government gains area C. Under an import quota (foreign exporters capture rents) — welfare loss = B + C + D (worse than tariff). Under a VER — same as quota with all rents to foreign exporters (B+C+D welfare loss). On the exam, know that VER typically causes the GREATEST welfare loss for the importing country.",
      definition:"Deadweight Loss (Trade): The net reduction in economic welfare caused by a trade restriction such as a tariff or quota; represented graphically by triangles B and D in the standard tariff welfare diagram, reflecting both production inefficiency (B) and consumption inefficiency (D).",
      example:"South Africa tariff example: World price = USD 5.00/ton, tariff = 20% → P_t = USD 6.00. Domestic production rises from 110,000 to 130,000 tons; quantity demanded falls from 200,000 to 170,000. Area B (production DWL) = 0.5 × $1 × 20,000 = $10,000. Area D (consumption DWL) = 0.5 × $1 × 30,000 = $15,000. Total deadweight loss = $10,000 + $15,000 = $25,000."
    },
    e6c:{
      body:`Regional trading blocs (RTAs) are agreements among groups of countries to reduce or eliminate trade barriers among members while maintaining separate (or common) policies toward non-members. RTAs have proliferated because reducing trade barriers among a small group is politically easier, faster, and less contentious than multilateral negotiations through the WTO.

The hierarchy of integration, from lowest to highest, is: (1) Free Trade Area (FTA): All barriers to goods and services trade among members are eliminated; each member maintains its own trade policy against non-members. Example: USMCA. (2) Customs Union: FTA plus a common trade policy (common external tariff) against non-members. Example: Benelux. (3) Common Market: Customs union plus free movement of factors of production (labor, capital) among members. Example: MERCOSUR. (4) Economic Union: Common market plus harmonized economic institutions and coordinated economic policies. Example: European Union. (5) Monetary Union: Economic union plus a common currency. Example: Eurozone.

Two key trade effects result from RTA formation: Trade creation occurs when RTA integration leads members to replace higher-cost domestic production with lower-cost imports from other members — a welfare gain. Trade diversion occurs when trade shifts from lower-cost non-member producers to higher-cost member producers (because of the preferential tariff), replacing efficient imports with less efficient ones — a welfare loss. Net welfare effect of an RTA = trade creation effect minus trade diversion effect. If trade creation dominates, the RTA improves welfare; if trade diversion dominates, welfare falls.

Additional benefits of RTAs include: economies of scale from larger market access for member firms, reduced monopoly power through increased competition, technology transfer, greater foreign direct investment attracted by the larger market, and reduced potential for conflict among members. Challenges include resistance from industries facing import competition, concerns about sovereignty (especially for smaller members), restrictions on independent macroeconomic policies (especially in monetary unions), and risks of crisis contagion.`,
      note:"The exam frequently tests the hierarchy of integration: FTA → Customs Union → Common Market → Economic Union → Monetary Union. The key distinguishing features: FTA adds free trade among members; Customs Union adds common external tariff; Common Market adds free factor movement; Economic Union adds policy harmonization; Monetary Union adds common currency.",
      definition:"Trade Diversion: The welfare-reducing effect of regional integration in which a lower-cost non-member supplier is replaced by a higher-cost member supplier due to preferential tariff treatment for members; contrasted with trade creation (welfare-increasing, replacing higher-cost domestic production with lower-cost member imports).",
      example:"Trade creation vs. diversion example: Qualor and Vulcan form an RTA. Before the RTA, Qualor imports from the world's lowest-cost producer, Aurelia (non-member). After the RTA, if Vulcan (member) is lower-cost than Qualor's domestic industry but higher than Aurelia, Qualor switches to importing from Vulcan — trade diversion (higher-cost imports replace lower-cost Aurelia imports). If Vulcan is actually the lowest-cost producer globally, the RTA creates trade — welfare improves."
    }
  },
  flashcards:[
    {q:"What are the welfare effects of a tariff on the importing country, and what causes the deadweight loss?",a:"Consumer surplus loss = A + B + C + D (price rises from P* to P_t). Producer surplus gain = A. Government tariff revenue = C. Net welfare effect = -(B + D). B is the production deadweight loss: inefficient domestic producers enter the market only because the tariff raises price above their cost. D is the consumption deadweight loss: consumers who would buy at P* but not at P_t are priced out. Total deadweight loss = B + D."},
    {q:"What is the key difference between an import quota and a VER in terms of welfare effects?",a:"Both restrict import quantity equally, raising domestic prices similarly. The KEY difference is who captures the quota rents (area C): Under a tariff — government captures C as tax revenue. Under an import quota (no license auction) — foreign exporters may capture C as profit, making welfare loss B+C+D. Under a VER — ALL quota rents (area C) accrue to foreign exporters, making the importing country's welfare loss B+C+D. VER is worst for the importing country."},
    {q:"Define and distinguish trade creation from trade diversion.",a:"Trade creation: RTA integration leads members to replace higher-cost DOMESTIC production with lower-cost imports from other members → welfare improves (eliminates production inefficiency). Trade diversion: RTA leads members to replace imports from lower-cost NON-MEMBER countries with higher-cost member imports (because members face no tariff) → welfare decreases (introduces production inefficiency). Net RTA welfare effect = trade creation minus trade diversion."},
    {q:"List the five levels of regional integration in ascending order of depth, and identify the key feature added at each level.",a:"1) Free Trade Area (FTA): Eliminates tariffs/quotas among members; each member keeps own external trade policy (e.g., USMCA). 2) Customs Union: Adds common external tariff against non-members (e.g., Benelux). 3) Common Market: Adds free movement of factors of production (e.g., MERCOSUR). 4) Economic Union: Adds harmonized economic institutions and policies (e.g., EU). 5) Monetary Union: Adds a common currency (e.g., Eurozone). Each level requires greater political integration."},
    {q:"What are the main reasons governments impose trade restrictions despite the net welfare loss?",a:"1) Infant industry argument: Protect new industries until they achieve scale and mature. 2) National security: Maintain domestic production of strategic goods (defense, energy, food). 3) Employment protection: Short-run job preservation in import-competing industries. 4) Revenue: Tariffs generate government revenue (important for developing economies). 5) Retaliation: Responding to trading partners' restrictions to gain bargaining leverage. 6) Terms of trade improvement: Large countries can potentially gain by worsening the exporter's terms of trade."},
    {q:"Why does the export subsidy cause a welfare loss in the exporting country?",a:"An export subsidy causes domestic producers to shift sales to the export market rather than the domestic market. Domestic consumers face a higher domestic price (supply diverts to exports), losing consumer surplus. The government pays the subsidy, incurring fiscal costs. Net welfare = consumer surplus loss + government subsidy cost — producer surplus gain < 0 (net negative). Globally, export subsidies distort comparative advantage, misallocating resources toward subsidized sectors."}
  ],
  questions:[
    "South Africa (a small country) imposes a tariff that raises the price of imported paper from USD 5.00 to USD 6.00 per ton. Domestic production rises from 110,000 to 130,000 tons and domestic demand falls from 200,000 to 170,000 tons. The deadweight loss from this tariff is closest to:\n\nA) USD 25,000\nB) USD 185,000\nC) USD 120,000\nD) USD 40,000\n\nAnswer: A — Deadweight loss = production triangle (B) + consumption triangle (D). Area B = 0.5 × $1 × 20,000 = $10,000. Area D = 0.5 × $1 × 30,000 = $15,000. Total DWL = $25,000. Choice B (USD 185,000) is the consumer surplus loss. Choice C (USD 120,000) is the producer surplus gain. Choice D (USD 40,000) is the government revenue.",
    "A country imposes an import quota on steel, and all quota rents accrue to foreign steel exporters. Compared to an equivalent tariff, the national welfare effect of the quota is:\n\nA) The same as the tariff because the same quantity of imports occurs\nB) Better than the tariff because domestic producers receive higher prices\nC) Worse than the tariff because area C (quota rents) goes to foreigners rather than the domestic government\nD) Better than the tariff because the domestic price is lower\n\nAnswer: C — When quota rents (area C) accrue to foreign exporters rather than the domestic government, the importing country's welfare loss is B + C + D compared to B + D under an equivalent tariff. The tariff allows the government to capture area C as revenue, making it superior from the importing country's perspective.",
    "Brazil, Argentina, Paraguay, and Uruguay have free movement of goods, services, and factors of production among themselves, but each country maintains its own external trade policy with non-member countries. This arrangement is best described as a:\n\nA) Free trade area\nB) Customs union\nC) Common market\nD) Economic union\n\nAnswer: C — A common market has free movement of goods, services, AND factors of production among members, but does NOT require a common external trade policy against non-members (distinguishing it from a customs union). In this scenario, free factor movement exists but each country has its own external trade policy.",
    "A country opens to free trade. According to trade theory, which of the following statements best describes the long-run outcome for workers in import-competing industries?\n\nA) All workers will be better off because overall national welfare increases\nB) Workers in import-competing industries will definitely lose permanently, even in the long run\nC) Workers with transferable skills may find employment in export industries, but those with industry-specific skills may be permanently worse off\nD) Workers will be compensated by government redistribution of the gains from trade\n\nAnswer: C — Trade theory recognizes that while overall national welfare rises, distribution is uneven. Workers with transferable skills can retrain and move to expanding export sectors. However, workers with highly industry-specific skills may face permanent income losses. Choice A is wrong because aggregate gains do not mean all individuals gain. Choice D is normative but rarely occurs in practice.",
    "The primary reason that regional trading agreements (RTAs) have proliferated while multilateral WTO negotiations have stalled is that:\n\nA) RTAs eliminate trade diversion, which multilateral agreements cannot\nB) RTAs are politically easier, faster, and require policy coordination among fewer countries\nC) RTAs guarantee larger welfare gains than multilateral trade liberalization\nD) RTAs allow countries to maintain higher tariffs against non-members indefinitely\n\nAnswer: B — RTAs are more attractive politically because coordinating among a small group of countries (e.g., 3 in USMCA, 27 in EU) is far less contentious and quicker than multilateral negotiations involving 164+ WTO members. Choice A is incorrect — RTAs can create trade diversion. Choice C is incorrect — multilateral free trade generally produces larger global welfare gains."
  ]

e7:{
  intro:"Learning Module 7 covers the foreign exchange (FX) market — the world's largest market with daily turnover of approximately USD 6.6 trillion. It examines FX market participants, nominal and real exchange rates, purchasing power parity, exchange rate regimes, and the objectives of capital restrictions.",
  sections:{
    e7a:{
      body:`The foreign exchange market is the world's largest trading market, with estimated daily turnover of approximately USD 6.6 trillion in 2019 — roughly 10-15 times larger than global fixed-income daily turnover and 50 times larger than global equity daily turnover. The FX market operates 24 hours a day, every business day, across all time zones, with London and New York being the two largest trading hubs. The market is decentralized (over-the-counter, not exchange-traded) and global in scope.

A nominal exchange rate is the rate at which two currencies trade in the market. Using the A/B convention: a USD/EUR rate of 1.1700 means EUR 1 buys USD 1.1700 (EUR is the base currency, USD is the price currency). A rise in USD/EUR means the EUR is appreciating (more dollars per euro). A fall means EUR depreciation. In the professional FX market, the convention hierarchy is: EUR is base first, then GBP, then USD, then others.

The real exchange rate adjusts the nominal rate for relative price levels, measuring relative purchasing power. Real exchange rate (d/f) = S(d/f) × P_f / P_d, where S(d/f) is the nominal spot rate (domestic per foreign), P_f is the foreign price level, and P_d is the domestic price level. If the real exchange rate rises, the domestic currency has less purchasing power relative to the foreign currency. The approximation for the change in the real exchange rate: %ΔReal ≈ %ΔNominal + %ΔP_f - %ΔP_d.

Purchasing power parity (PPP) describes the long-run equilibrium of nominal exchange rates: the nominal exchange rate should adjust so that identical goods cost the same in both countries when priced in a common currency. Relative PPP states that the percentage change in the exchange rate equals the inflation differential: %ΔS(d/f) = inflation_f - inflation_d. PPP is a poor short-run predictor because exchange rates deviate substantially from PPP for extended periods, driven by capital flows, risk appetite, and other non-trade factors. However, PPP provides a useful long-run anchor for exchange rate analysis.`,
      note:"In the A/B convention, A is the price currency and B is the base currency. An INCREASE in the A/B rate means the BASE currency (B) is appreciating — you need more units of A to buy one unit of B. Do not confuse appreciation and depreciation with increases and decreases in the quote without checking which currency is base vs. price. This is the most common FX exam trap.",
      definition:"Real Exchange Rate: An index measuring the relative purchasing power of one currency against another, calculated as the nominal exchange rate adjusted for relative price levels; Real = S(d/f) × (P_f / P_d); an increase means the domestic currency has weakened in real purchasing power terms.",
      example:"UK investor example: AUD/HKD spot rate increases by 5%, HKD price level rises 5%, AUD price level rises 2%. Change in real exchange rate (AUD/HKD) ≈ +5% + 5% - 2% = +8%. This means the Australian investor's real purchasing power for HKD-denominated goods has DECREASED by 8% — both because the HKD appreciated (5% nominal) and because HKD goods became more expensive in real terms."
    },
    e7b:{
      body:`FX market participants span a wide range. The sell side consists of large dealing banks (Deutsche Bank, Citigroup, UBS, HSBC) that provide quotes and act as market makers. The buy side includes: corporate accounts (companies managing FX exposures from international trade and M&A), real money accounts (insurance companies, mutual funds, pension funds — restricted from leverage), leveraged accounts (hedge funds, proprietary traders — use leverage and derivatives), retail accounts (individual investors, foreign tourists), governments (for defense purchases and policy objectives), central banks (managing FX reserves — total global FX reserves were nearly USD 13 trillion at end of 2021; nearly 60% held in USD), and sovereign wealth funds (SWFs).

The most active FX market participants by volume are NOT corporations engaged in trade, but large institutional investors, hedge funds, and central banks. About 51% of FX flows are from financial clients (investment funds, hedge funds, central banks, SWFs), 42% from interbank trading between dealing banks, and only 8% from non-financial clients (corporations, retail). The FX market's instrument breakdown (2016 BIS survey): FX swaps dominate at 49% of daily volume. Spot transactions represent only 33%. Outright forwards account for 14%, and FX options for 5%.

The top currency pairs by daily turnover: USD/EUR (23.1%), JPY/USD (17.8%), USD/GBP (9.3%), USD/AUD (5.2%), CAD/USD (4.3%). The US dollar is involved in approximately 88% of all FX transactions (BIS data), reflecting its status as the world's reserve currency.

Exchange rate regimes range from fully floating (exchange rate set entirely by market supply and demand, as in the US, Eurozone, UK, Japan) to currency boards (strict peg with 100% foreign reserve backing, e.g., Hong Kong) to full dollarization (adopting another country's currency, e.g., Ecuador using USD). Intermediate regimes include crawling pegs, managed floats, and target zones. Fixed regimes provide exchange rate stability and imported monetary credibility but sacrifice independent monetary policy. Floating regimes allow independent monetary policy but create exchange rate volatility.`,
      note:"The majority of FX daily volume (49%) comes from FX SWAPS (used to roll hedges), NOT spot transactions (33%). Most FX activity is driven by financial investors (51% of flows), not corporations conducting international trade (8%). These facts are frequently tested.",
      definition:"Purchasing Power Parity (PPP): The theory that exchange rates adjust in the long run so that identical goods have the same price in different countries when measured in a common currency; relative PPP states that the percentage change in exchange rates equals the inflation differential between countries.",
      example:"Real exchange rate calculation: India-US example (2018). INR/USD rose by 6.7% (USD appreciated vs. rupee). US inflation = 2.5%; India inflation = 4.7%. Change in real exchange rate (INR/USD) ≈ +6.7% + 2.5% - 4.7% = +4.5%. The nominal rate rose 6.7% (USD appreciation), but the real rate only rose 4.5% because Indian inflation was higher, partially offsetting the nominal weakness."
    }
  },
  flashcards:[
    {q:"In the USD/EUR exchange rate quote, which is the base currency, and what does an increase in the rate mean?",a:"EUR is the BASE currency (denominator); USD is the PRICE currency (numerator). An INCREASE in USD/EUR means the EUR is APPRECIATING — each EUR buys MORE USD. A decrease means EUR depreciation (buying fewer USD). Memory aid: the base currency is what you're 'buying' — the price currency is what you 'pay.' In the A/B convention: A = price currency, B = base currency."},
    {q:"How is the real exchange rate calculated and what does an increase imply for purchasing power?",a:"Real exchange rate (d/f) = S(d/f) × (P_f / P_d). Approximate change: %ΔReal ≈ %ΔNominal + %ΔP_f - %ΔP_d. An INCREASE in the real exchange rate (d/f convention) means the domestic currency has WEAKENED in real terms — it now costs more in real domestic purchasing power to buy foreign goods. The domestic buyer's real purchasing power has DECLINED."},
    {q:"What are the main categories of FX market participants and which group generates the most daily volume?",a:"Sell side: Large dealing banks. Buy side: Corporate accounts, Real money accounts (pension funds, mutual funds, insurance companies), Leveraged accounts (hedge funds, prop traders), Retail accounts, Governments, Central banks, Sovereign Wealth Funds. Largest volume generators: Financial clients (investment funds, hedge funds, central banks, SWFs) account for 51% of flows. Interbank = 42%. Non-financial (corporations, retail) only 8%."},
    {q:"What does Purchasing Power Parity (PPP) predict about exchange rate movements?",a:"Relative PPP: The percentage change in the nominal exchange rate equals the inflation differential. %ΔS(d/f) ≈ Inflation_f - Inflation_d. If inflation in Country F is 5% and Country D is 2%, the currency of Country F should depreciate by approximately 3% against Country D's currency. PPP is a poor short-run predictor (rates deviate significantly for years) but a useful long-run anchor. Capital flows, risk appetite, and interest rate differentials dominate in the short run."},
    {q:"What are the key trade-offs between fixed and floating exchange rate regimes?",a:"Fixed/pegged regime: ADVANTAGES — exchange rate certainty, imports monetary credibility (fights inflation), reduces speculation. DISADVANTAGES — loses independent monetary policy (must match anchor country rates), vulnerable to speculative attacks if fundamentals diverge, may maintain misaligned rates causing trade imbalances. Floating regime: ADVANTAGES — independent monetary policy, exchange rate adjusts to external shocks. DISADVANTAGES — exchange rate volatility (uncertainty for trade and investment), potential for misalignment and speculative bubbles."}
  ],
  questions:[
    "An investment adviser in Australia notes that the AUD/HKD spot exchange rate has increased by 5%, the Hong Kong price level has risen by 5%, and the Australian price level has risen by 2%. The change in the real exchange rate (AUD/HKD) and its impact on the Australian investor's purchasing power are closest to:\n\nA) Real exchange rate falls 8%; purchasing power improves 8%\nB) Real exchange rate rises 8%; purchasing power falls 8%\nC) Real exchange rate falls 2%; purchasing power improves 2%\nD) Real exchange rate rises 2%; purchasing power falls 2%\n\nAnswer: B — %ΔReal(AUD/HKD) ≈ %ΔNominal + %ΔP_HKD - %ΔP_AUD = +5% + 5% - 2% = +8%. An INCREASE in the real exchange rate (AUD/HKD, where AUD is price currency) means the HKD has appreciated in real terms — the Australian investor needs more real AUD purchasing power to buy the same HKD goods. Therefore, purchasing power falls by ~8%.",
    "The GBP/EUR exchange rate falls from 0.8920 to 0.8800. This change indicates that:\n\nA) The euro has depreciated against the pound sterling\nB) The pound sterling has depreciated against the euro\nC) The pound sterling has appreciated against the euro\nD) The euro has appreciated against the pound sterling, and the pound has depreciated\n\nAnswer: C — In the GBP/EUR convention, GBP is the PRICE currency and EUR is the BASE currency. A DECREASE in GBP/EUR means fewer GBP are needed to buy one EUR — so the EUR is DEPRECIATING (or equivalently, the GBP is APPRECIATING). Each EUR buys fewer GBP, meaning the EUR is weaker and the GBP is stronger.",
    "Which of the following is most accurate regarding the composition of FX market daily turnover?\n\nA) Spot transactions account for the majority of daily volume at approximately 49%\nB) FX swaps account for the majority of daily volume at approximately 49%\nC) Non-financial clients (corporations, retail) account for over 50% of daily counterparty flows\nD) The top currency pair (USD/EUR) accounts for over 50% of all daily transactions\n\nAnswer: B — According to BIS survey data, FX swaps account for approximately 49% of daily turnover, followed by spot at 33%, outright forwards at 14%, and FX options at 5%. Spot does NOT dominate. Choice C is wrong — non-financial clients are only about 8% of flows.",
    "An emerging market economy maintains a fixed exchange rate peg to the USD. If the US Federal Reserve raises interest rates significantly, the most likely consequence for the pegged economy is:\n\nA) Capital outflows and appreciation pressure on the pegged currency\nB) The central bank must raise rates to defend the peg, which may be contractionary if the domestic economy is weak\nC) The domestic economy can benefit from lower rates while maintaining the peg\nD) The peg automatically adjusts to reflect the interest rate differential\n\nAnswer: B — Under a currency peg, the country must maintain interest rate parity with the anchor currency to prevent capital outflows. If the US raises rates, capital flows toward USD unless the pegged country also raises rates. The pegged central bank must raise rates to defend the peg — even if its own economy does not need tightening.",
    "Relative purchasing power parity (PPP) predicts that the annual percentage change in the USD/EUR exchange rate should be approximately equal to:\n\nA) The difference between US and Eurozone interest rates\nB) The difference between Eurozone and US inflation rates\nC) The product of Eurozone inflation and US interest rates\nD) The ratio of Eurozone nominal GDP to US nominal GDP\n\nAnswer: B — Relative PPP states that the percentage change in the exchange rate (price currency/base currency) equals the inflation rate of the base currency country (Eurozone) minus the inflation rate of the price currency country (US): %ΔS(USD/EUR) ≈ Inflation_EUR - Inflation_USD. Choice A describes the interest rate differential (not PPP)."
  ]
},
e8:{
  intro:"Learning Module 8 covers the practical calculations essential for FX trading: cross-rate calculations, forward rate calculations using forward points, the arbitrage relationship between spot rates, forward rates, and interest rates (covered interest rate parity), and the interpretation of forward discounts and premiums. These are highly testable quantitative skills for the CFA exam.",
  sections:{
    e8a:{
      body:`A cross-rate is an exchange rate between two currencies derived from their individual exchange rates against a third common currency (typically the USD). The professional FX market only directly quotes certain major currency pairs; other rates must be calculated. The calculation method uses the standard A/B convention to ensure units cancel correctly — treat exchange rates as fractions and multiply or invert as needed for the currencies to cancel.

For example, to calculate the CAD/EUR (euro-Canada) cross-rate from market quotes: (CAD/USD) × (USD/EUR) = CAD/EUR. If dollar-Canada (CAD/USD) = 1.3020 and euro-dollar (USD/EUR) = 1.1701, then CAD/EUR = 1.3020 × 1.1701 = 1.5235. When the cross-rate requires inverting one quote, it is called "triangular" because three currencies are involved. For example, to get JPY/CAD from dollar-Canada (CAD/USD) and dollar-yen (JPY/USD): Invert CAD/USD to get USD/CAD = 1/1.3020 = 0.7680, then multiply by JPY/USD = 111.94 to get JPY/CAD = 85.97.

Triangular arbitrage occurs when a cross-rate quoted in the market differs from the cross-rate implied by the underlying exchange rates. In the example above, if a dealer quotes JPY/CAD at 86.20 (vs. the implied 85.97), an arbitrageur could buy CAD at 85.97 JPY/CAD and simultaneously sell CAD at 86.20 JPY/CAD, earning a riskless profit of 0.23 JPY per CAD. Arbitrage trades rapidly eliminate these discrepancies in efficient FX markets, so such opportunities are rare and short-lived.

The percentage change in a currency can be calculated from exchange rate movements. For a rate quoted as A/B: % change in base currency (B) = (New rate / Old rate) - 1. Note the asymmetry: if B depreciates by 10%, A appreciates by MORE than 10% — specifically, [1/(1-0.10)] - 1 = 11.11%. If CHF/GBP falls by 12% (CHF depreciation against GBP), GBP has appreciated by [1/(1-0.12)] - 1 = 13.64% against CHF — more than 12%.`,
      note:"When calculating cross-rates, treat the exchange rate quotes as fractions and multiply so that the common (intermediate) currency cancels out. If you need to cancel the currency in the denominator, invert the relevant quote. Always check that the units in the final calculation give you exactly the cross-rate you want (price currency on top, base currency on bottom).",
      definition:"Cross-Rate: An exchange rate between two currencies derived from their respective exchange rates against a common third currency; used when a direct quote is not available in the professional FX market; calculated by multiplying or inverting component exchange rate quotes to cancel the intermediate currency.",
      example:"CHF/EUR cross-rate calculation: Market quotes: USD/EUR = 1.1701, CHF/USD = 0.9900. CHF/EUR = (CHF/USD) × (USD/EUR) = 0.9900 × 1.1701 = 1.1584. Interpretation: EUR 1 buys CHF 1.1584. To calculate the expected CHF/EUR in one year: USD/EUR expected = 1.1619, CHF/USD expected = 0.9866. CHF/EUR expected = 0.9866 × 1.1619 = 1.1463. The CHF is expected to appreciate against the EUR (fewer CHF needed per EUR)."
    },
    e8b:{
      body:`The forward exchange rate is the rate agreed upon today for currency delivery at a specified future date. Forward rates are determined by the covered interest rate parity (CIP) arbitrage relationship, which ensures that two alternative investments — one domestic, one in foreign currency hedged with a forward — earn the same return. In f/d quoting convention (foreign units per domestic): F(f/d) = S(f/d) × [(1 + r_f) / (1 + r_d)].

Forward points (also called swap points or pips) are the difference between the forward rate and the spot rate, scaled to the last decimal place in the spot quote. For non-yen currencies (quoted to 4 decimal places): Forward points = (F - S) × 10,000. For yen pairs (quoted to 2 decimal places): Forward points = (F - S) × 100. The forward rate is: F = S + (Forward points / 10,000). For example: spot USD/EUR = 1.15885, one-year forward points = +364.7 → forward rate = 1.15885 + (364.7/10,000) = 1.19532.

If the forward rate exceeds the spot rate (positive forward points), the BASE currency is trading at a forward PREMIUM — meaning the base currency's country has LOWER interest rates than the price currency's country. If the forward rate is below spot (negative forward points), the base currency is at a forward DISCOUNT — the base currency's country has HIGHER interest rates. This is counterintuitive: the higher-interest-rate currency trades at a forward discount. Intuitively: investing in the high-interest-rate currency earns more domestically, so the currency must be expected to depreciate in the forward market to eliminate the arbitrage.

Forward points are approximately proportional to: (1) the spot exchange rate, (2) the interest rate differential (r_f - r_d), and (3) the time to maturity (τ). Precise formula: F - S ≈ S × (r_f - r_d) × τ / (1 + r_d × τ). Doubling the time to maturity approximately doubles the forward points. Doubling the interest rate differential approximately doubles the forward points. For percentage forward premium/discount: (F/S) - 1 = percentage premium (positive) or discount (negative) of the base currency.`,
      note:"The currency with the HIGHER interest rate always trades at a forward DISCOUNT (its forward rate is lower than spot). The currency with the LOWER interest rate trades at a forward PREMIUM. This is the covered interest rate parity relationship — it prevents riskless arbitrage between domestic investment and hedged foreign investment.",
      definition:"Forward Points (Swap Points): The difference between the forward exchange rate and the spot exchange rate, scaled by the conventional decimal place of the spot quote (× 10,000 for most currencies; × 100 for JPY pairs); positive points indicate the base currency is at a forward premium (lower interest rate country); negative points indicate a forward discount (higher interest rate country).",
      example:"Forward rate calculation: French company will receive GBP 50 million in 32 days. GBP/EUR spot = 0.8752, one-month forward points = -1.4. Forward rate = 0.8752 + (-1.4/10,000) = 0.8752 - 0.00014 = 0.87506. The negative forward points indicate GBP is at a forward discount (Eurozone interest rates are higher than UK rates). The company sells GBP forward at 0.87506 EUR/GBP to lock in EUR receipts."
    }
  },
  flashcards:[
    {q:"How do you calculate a cross-rate, and what is the general method?",a:"Treat exchange rates as fractions with currencies as units. Multiply quotes so the intermediate (common) currency cancels. Example: To get CAD/EUR from CAD/USD = 1.3020 and USD/EUR = 1.1701: (CAD/USD) × (USD/EUR) = CAD/EUR = 1.3020 × 1.1701 = 1.5235. If the common currency is in the denominator of both quotes, invert one. Always verify the final units match the desired cross-rate."},
    {q:"What is covered interest rate parity (CIP) and what is the forward rate formula?",a:"CIP: Two equivalent risk-free investments — one domestic, one in foreign currency hedged with a forward — must yield the same return. F(f/d) = S(f/d) × (1 + r_f)/(1 + r_d). If foreign interest rate r_f > domestic r_d, then F > S → foreign currency is at a forward DISCOUNT (in f/d terms). If r_f < r_d, F < S → foreign currency is at a forward PREMIUM. The higher interest rate country's currency always trades at a forward discount."},
    {q:"How do forward points relate to the forward rate, and what do positive vs. negative points indicate?",a:"Forward rate = Spot rate + (Forward points / 10,000) for non-JPY pairs. Forward points = (Forward rate - Spot rate) × 10,000. POSITIVE forward points: Forward rate > Spot rate → base currency is at a forward PREMIUM → base currency country has LOWER interest rates. NEGATIVE forward points: Forward rate < Spot rate → base currency is at a forward DISCOUNT → base currency country has HIGHER interest rates. Higher interest rate currency = forward discount."},
    {q:"If CHF depreciates 12% against GBP, by how much does GBP appreciate against CHF?",a:"GBP appreciation vs. CHF = [1/(1-0.12)] - 1 = [1/0.88] - 1 = 1.1364 - 1 = 13.64%. GBP appreciates by MORE than 12% because the percentage change depends on the starting base. This asymmetry is always tested: if A depreciates by x%, B appreciates by MORE than x%. Formula: appreciation of B = [1/(1-x)] - 1."},
    {q:"What is triangular arbitrage and when does it occur?",a:"Triangular arbitrage: A riskless profit opportunity arising when a quoted cross-rate differs from the implied cross-rate calculated from underlying exchange rate quotes. Example: If implied JPY/CAD = 85.97 but market quotes JPY/CAD = 86.20, buy CAD at 85.97 JPY/CAD and sell at 86.20 JPY/CAD → profit of 0.23 JPY per CAD with no risk. In efficient markets, such discrepancies are rapidly eliminated by algorithmic traders."},
    {q:"How are forward points proportional to time, interest rate differential, and spot rate?",a:"Forward points ≈ S(f/d) × (r_f - r_d) × τ / (1 + r_d × τ), where τ = time fraction (actual days/360). Approximately proportional to: (1) Spot rate S — larger spot rate → more absolute forward points. (2) Interest rate differential — doubling the spread approximately doubles forward points. (3) Time to maturity τ — doubling the time approximately doubles forward points. Positive forward points = base currency at premium = base country has lower rates. Negative = discount = base country has higher rates."}
  ],
  questions:[
    "A dealer provides the following spot rates: USD/EUR = 1.1701, CHF/USD = 0.9900. The CHF/EUR cross-rate is closest to:\n\nA) 0.8461\nB) 0.8546\nC) 1.1584\nD) 1.0618\n\nAnswer: C — CHF/EUR = (CHF/USD) × (USD/EUR) = 0.9900 × 1.1701 = 1.1584. The USD cancels out, giving CHF per EUR. Choice A (0.8461) results from incorrectly dividing rather than multiplying.",
    "The USD/EUR spot rate is 1.1585 and the one-year forward points are +364.7. The one-year forward exchange rate (USD/EUR) is closest to:\n\nA) 1.1220\nB) 1.1585\nC) 1.1950\nD) 1.5232\n\nAnswer: C — Forward rate = Spot + (Points / 10,000) = 1.1585 + (364.7 / 10,000) = 1.1585 + 0.03647 = 1.19497 ≈ 1.1950. The positive forward points indicate EUR is at a forward premium — EUR interest rates are lower than USD rates.",
    "The 30-day domestic (EUR) risk-free rate is 2.00% annualized and the 30-day foreign (USD) risk-free rate is 3.00% annualized. The spot USD/EUR rate is 1.1600. The 30-day forward rate (USD/EUR) is closest to:\n\nA) 1.1610\nB) 1.1590\nC) 1.1503\nD) 1.1697\n\nAnswer: A — Forward rate = 1.1600 × (1 + 0.03 × 30/360) / (1 + 0.02 × 30/360) = 1.1600 × (1.002500) / (1.001667) = 1.1600 × 1.000832 ≈ 1.1610. The USD has a higher interest rate (3%), so USD is at a forward discount — EUR appreciates in the forward market. Positive forward points of approximately +0.97.",
    "A French company will receive GBP 50 million in 32 days. The GBP/EUR spot rate is 0.8752 and one-month forward points are -1.4. To hedge the FX risk, the French company should:\n\nA) Buy GBP forward at 0.87506 EUR per GBP\nB) Sell GBP forward at 0.87506 EUR per GBP\nC) Buy EUR forward at 0.87534 GBP per EUR\nD) Sell EUR forward at 0.87534 GBP per EUR\n\nAnswer: B — The French company has GBP receivable — it will RECEIVE GBP and wants EUR. To hedge, it should SELL GBP forward (converting GBP to EUR at the forward rate). Forward rate = 0.8752 + (-1.4/10,000) = 0.87506 EUR per GBP. Choice A (buying GBP) would increase, not hedge, the exposure.",
    "If the base currency in a forward exchange rate quote is at a forward discount of 0.5%, this most likely indicates that:\n\nA) The base currency is expected to appreciate against the price currency\nB) The interest rate in the base currency country is higher than in the price currency country\nC) The forward rate is 0.5% above the spot rate\nD) The base currency is trading at a forward premium\n\nAnswer: B — A forward discount on the base currency (forward rate < spot rate) indicates that the base currency country has HIGHER interest rates than the price currency country. Under covered interest rate parity, the higher-interest-rate currency must trade at a forward discount to prevent riskless arbitrage. Choice A is wrong — a discount implies expected depreciation. Choice C incorrectly describes the direction."
  ]
}
};

function FlashcardModal({mod,cards,t,onClose}){
  const[idx,setIdx]=useState(0);const[flipped,setFlipped]=useState(false);const[ratings,setRatings]=useState({});const[done,setDone]=useState(false);
  if(!cards?.length)return null;
  const card=cards[idx];const knew=Object.values(ratings).filter(r=>r==="knew").length;const review=Object.values(ratings).filter(r=>r==="review").length;
  const rate=(r)=>{setRatings(p=>({...p,[idx]:r}));if(idx<cards.length-1){setIdx(i=>i+1);setFlipped(false);}else setDone(true);};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(4px)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:t.bg,border:`1px solid ${t.bdr}`,borderRadius:14,width:"100%",maxWidth:560,padding:30,boxShadow:"0 24px 60px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div><div style={{fontSize:11,fontWeight:700,color:t.fc,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:2}}>🃏 Flashcards</div><div style={{fontSize:14,fontWeight:600,color:t.txt}}>{mod.num} · {mod.title}</div></div>
          <button onClick={onClose} style={{background:"none",border:`1px solid ${t.bdr}`,borderRadius:6,padding:"4px 10px",cursor:"pointer",color:t.muted,fontSize:16}}>✕</button>
        </div>
        {!done?(<>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <div style={{flex:1,height:4,background:t.bdr,borderRadius:2,overflow:"hidden"}}><div style={{width:`${(idx/cards.length)*100}%`,height:"100%",background:t.fc,borderRadius:2}}/></div>
            <span style={{fontSize:12,color:t.muted,flexShrink:0}}>{idx+1}/{cards.length}</span>
          </div>
          <div onClick={()=>setFlipped(f=>!f)} style={{minHeight:180,cursor:"pointer",background:flipped?t.fcBg:t.surf,border:`1.5px solid ${flipped?t.fc:t.bdr}`,borderRadius:11,padding:"26px 24px",marginBottom:18,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",transition:"all 0.2s"}}>
            <div style={{fontSize:10,fontWeight:700,color:flipped?t.fc:t.lite,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>{flipped?"✦ ANSWER":"QUESTION — tap to flip"}</div>
            <p style={{fontSize:15,lineHeight:1.75,color:t.txt,fontFamily:"Georgia,serif",margin:0}}>{flipped?card.a:card.q}</p>
          </div>
          {flipped?(<div style={{display:"flex",gap:10}}>
            <button onClick={()=>rate("review")} style={{flex:1,padding:"10px",borderRadius:8,border:"1.5px solid #dc2626",background:"#fef2f2",color:"#dc2626",cursor:"pointer",fontWeight:700,fontSize:13}}>🔁 Review Again</button>
            <button onClick={()=>rate("knew")} style={{flex:1,padding:"10px",borderRadius:8,border:"1.5px solid #16a34a",background:"#f0fdf4",color:"#16a34a",cursor:"pointer",fontWeight:700,fontSize:13}}>✓ Got It</button>
          </div>):<p style={{textAlign:"center",fontSize:12,color:t.lite,margin:0}}>Tap card to reveal answer · Rate yourself</p>}
        </>):(
          <div style={{textAlign:"center",padding:"8px 0"}}>
            <div style={{fontSize:40,marginBottom:8}}>🎯</div>
            <h3 style={{fontFamily:"Georgia,serif",fontSize:22,fontWeight:600,color:t.txt,marginBottom:16}}>Session Complete!</h3>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:24}}>
              <div style={{background:"#f0fdf4",border:"1.5px solid #16a34a",borderRadius:10,padding:"12px 24px"}}><div style={{fontSize:26,fontWeight:800,color:"#16a34a"}}>{knew}</div><div style={{fontSize:12,color:"#16a34a",fontWeight:600}}>Got It</div></div>
              <div style={{background:"#fef2f2",border:"1.5px solid #dc2626",borderRadius:10,padding:"12px 24px"}}><div style={{fontSize:26,fontWeight:800,color:"#dc2626"}}>{review}</div><div style={{fontSize:12,color:"#dc2626",fontWeight:600}}>Need Review</div></div>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button onClick={()=>{setIdx(0);setFlipped(false);setRatings({});setDone(false);}} style={{padding:"8px 18px",borderRadius:7,border:`1.5px solid ${t.bdr}`,background:"none",color:t.txt,cursor:"pointer",fontSize:12}}>Restart Deck</button>
