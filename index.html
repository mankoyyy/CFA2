  q1: {
    intro: "This module covers interest rates, time value of money, and the various methods of measuring investment returns. It establishes the foundational framework for understanding how money changes in value over time and how investment performance is measured and compared.",
    sections: {
      q1a: {
        body: `Interest rates are a critical concept in finance. An interest rate (or yield), denoted r, is a rate of return that reflects the relationship between differently dated cash flows. Interest rates can have three interpretations: (1) a required rate of return — the minimum return an investor requires to invest; (2) a discount rate — the rate used to find the present value of future cash flows; or (3) an opportunity cost — what an investor gives up by choosing one investment over another.

An interest rate can be decomposed into fundamental components: r = Real risk-free interest rate + Inflation premium + Default risk premium + Liquidity premium + Maturity premium. The real risk-free interest rate is the single-period interest rate for a completely risk-free security if no inflation were expected, reflecting individuals' time preferences for current versus future real consumption. The inflation premium compensates investors for expected inflation, reflecting the average inflation rate expected over the maturity of the debt.

The default risk premium compensates investors for the possibility that the borrower will fail to make a promised payment at the contracted time and in the contracted amount. The liquidity premium compensates investors for the risk of loss relative to an investment's fair value if the investment needs to be converted to cash quickly. The maturity premium compensates investors for the increased sensitivity of the market value of debt to a change in market interest rates as maturity is extended.

The nominal risk-free rate is approximated as the sum of the real risk-free rate and the inflation premium. In practice, government securities such as T-bills are used as proxies for the risk-free rate, though they contain an inflation premium. A financial asset's total return consists of two components: an income yield (dividends or interest) and a capital gain or loss from changes in price.`,
        note: "The interest rate equation r = Real risk-free rate + Inflation premium + Default risk premium + Liquidity premium + Maturity premium is a core formula. Know what each premium compensates for.",
        definition: "Interest Rate: A rate of return that reflects the relationship between differently dated cash flows; can be interpreted as a required rate of return, discount rate, or opportunity cost.",
        example: "Given 5 securities with varying maturity, liquidity, and default risk characteristics: Security 1 (2yr, high liquidity, low default) = 2.0%, Security 2 (2yr, low liquidity, low default) = 2.5% — the 0.5% difference reflects the liquidity premium. Security 4 (8yr, high liquidity, low default) = 4.0% vs Security 1 = 2.0% — the 2.0% difference reflects the maturity premium for an additional 6 years."
      },
      q1b: {
        body: `A holding period return (HPR), R, is the return earned from holding an asset for a single specified period. It is calculated as: R = (P1 - P0 + I1) / P0, where P0 is beginning price, P1 is ending price, and I1 is income received. For example, a stock bought at 100 and sold at 105 with a dividend of 2 has an HPR of 7% = (105 - 100 + 2)/100.

The arithmetic mean return is the simple average of holding period returns: R̄ = (R1 + R2 + ... + Rn) / n. It is the best estimate of the expected return in a single period and is appropriate for evaluating expected future performance when returns are not being compounded. However, it overstates compound growth rates.

The geometric mean return is calculated as: Rg = [(1+R1)(1+R2)...(1+Rn)]^(1/n) - 1. It represents the constant rate that would produce the same final value as the actual series of returns when compounded. The geometric mean is always less than or equal to the arithmetic mean (equal only when all returns are identical). It is the appropriate measure of past performance over multiple periods.

The harmonic mean is the reciprocal of the arithmetic mean of reciprocals: RH = n / Σ(1/Ri). It is appropriate for averaging ratios and rates, such as price-to-earnings ratios or cost averaging. The trimmed mean and winsorized mean are used to reduce the influence of outliers. The trimmed mean removes a percentage of the largest and smallest values before averaging. The winsorized mean replaces extreme values with the nearest non-extreme values rather than removing them entirely.`,
        note: "Geometric mean is always ≤ arithmetic mean. Use geometric for multi-period historical returns (what actually happened), arithmetic for expected future single-period returns. This distinction is frequently tested.",
        definition: "Geometric Mean Return: The nth root of the product of (1 + each period's return), minus 1. Measures the compound growth rate of an investment over multiple periods.",
        example: "Three annual returns: −50%, 35%, 27%. Arithmetic mean = (−50+35+27)/3 = 4%. Geometric mean = [(1−0.50)(1+0.35)(1+0.27)]^(1/3) − 1 = [(0.50)(1.35)(1.27)]^(1/3) − 1 = [0.8573]^(1/3) − 1 = −4.97%. The geometric mean of −4.97% correctly reflects that a $100 investment would have declined to about $85.73 over three years."
      },
      q1c: {
        body: `The money-weighted return (MWR) is essentially the internal rate of return (IRR) of a portfolio, taking into account the timing and size of all cash flows (contributions and withdrawals). It is the rate of return, r, that equates the present values of all cash outflows with the present values of all cash inflows. MWR is appropriate for measuring the actual return earned by an investor given their specific cash flow decisions.

The time-weighted return (TWR) measures the growth rate of one unit of currency invested in a portfolio over a stated measurement period. It is calculated by: (1) dividing the full measurement period into sub-periods based on cash flows; (2) calculating the holding period return for each sub-period; (3) linking the sub-period returns geometrically. TWR eliminates the effect of external cash flows and is appropriate for comparing portfolio managers' performance because managers cannot control the timing of client contributions and withdrawals.

For a portfolio receiving contributions at favorable times (before good performance), the MWR will exceed the TWR. Conversely, if contributions occur before poor performance, the MWR will be less than the TWR. The CFA Institute's Global Investment Performance Standards (GIPS) require the use of time-weighted returns for reporting investment performance.

To annualize any return for a period shorter than one year, compound by the number of periods in a year: Rannual = (1 + Rperiod)^c − 1, where c is the number of periods per year. For a weekly return: c = 52; monthly: c = 12; quarterly: c = 4. For periods longer than one year, c < 1. The continuously compounded return is: r = ln(1 + R) = ln(P1/P0). Continuously compounded returns are additive across time: r(0,T) = r(T−1,T) + r(T−2,T−1) + ... + r(0,1).`,
        note: "TWR is preferred for evaluating portfolio managers (eliminates cash flow timing effects). MWR reflects the investor's actual experience including timing of contributions. GIPS requires TWR.",
        definition: "Time-Weighted Return: The compound rate of growth of one unit of money initially invested in the portfolio, unaffected by external cash flows; calculated by geometrically linking sub-period HPRs.",
        example: "Portfolio: invest $1,000 at start of year 1. End of year 1 value = $1,100 (HPR1 = 10%). Investor adds $500. End of year 2 value = $1,540 ((1,100+500)×(1+r2)). If year 2 HPR = −4%, final value = $1,536. TWR = [(1.10)(0.96)]^(1/2) − 1 = 2.8%. MWR: solve 1000(1+r)^2 + 500(1+r) = 1536, giving MWR ≈ 2.2%, which is lower because the larger amount was invested before the negative year."
      }
    },
    flashcards: [
      {q:"What are the three interpretations of an interest rate?", a:"(1) Required rate of return — minimum return demanded by investors. (2) Discount rate — used to find present value of future cash flows. (3) Opportunity cost — value of the next best alternative forgone."},
      {q:"State the interest rate decomposition formula.", a:"r = Real risk-free rate + Inflation premium + Default risk premium + Liquidity premium + Maturity premium. Each premium compensates investors for a distinct type of risk."},

      {q:"When should you use geometric mean vs arithmetic mean?", a:"Geometric mean: for measuring historical multi-period compound growth (what actually happened). Arithmetic mean: for estimating expected single-period future return. Geometric mean ≤ arithmetic mean always."},

      {q:"What is a continuously compounded return and why is it useful?", a:"r = ln(1 + R) = ln(P1/P0). Continuously compounded returns are additive across time: r(0,T) = sum of all sub-period continuously compounded returns. This mathematical property makes them convenient for multi-period analysis."},
      {q:"What is the gross return vs net return distinction?", a:"Gross return is the return before deducting management and administrative fees. Net return is after all fund expenses. Net return is the better measure of what an investor actually earned."},

  q2: {
    intro: "This module covers the time value of money as applied specifically to fixed-income instruments, equity instruments, and derivative pricing through the principle of cash flow additivity. It builds on basic TVM to show how bond prices, equity values, and forward rates are derived.",
    sections: {
      q2a: {
        body: `The time value of money (TVM) is the principle that money available now is worth more than the same amount in the future due to its potential earning capacity. For fixed-income instruments, the discount rate is an interest rate, and the rate of return on a bond is its yield-to-maturity (YTM).

Discount bonds (zero-coupon bonds) pay a single cash flow (FV) at maturity. The present value is: PV = FV / (1+r)^t. For example, a Republic of India government bond paying INR100 in 20 years with a YTM of 6.70% has a PV = 100/(1.067)^20 = INR27.33.

Periodic interest bonds (coupon bonds) pay regular interest (coupon) payments plus principal at maturity. The PV is the sum of the present values of all cash flows: PV = Σ[PMT/(1+r)^t] + FV/(1+r)^N. Bond prices and yields move inversely: when rates rise, prices fall; when rates fall, prices rise. A bond priced above par (premium) has a coupon rate above its YTM; a bond below par (discount) has a coupon below its YTM.

Level payment instruments (mortgages, annuities) have equal periodic payments that include both interest and principal repayment. The payment is calculated as: PMT = PV × [r(1+r)^N] / [(1+r)^N − 1]. For equity instruments, the discount rate represents the required return on equity. The Gordon Growth Model prices a stock as: P0 = D1 / (r − g), where D1 is the next dividend, r is the required return, and g is the constant dividend growth rate.`,
        note: "Bond price and YTM move inversely. Premium bond: coupon > YTM, price > par. Discount bond: coupon < YTM, price < par. Par bond: coupon = YTM, price = par. This relationship is fundamental to fixed income.",
        definition: "Yield-to-Maturity (YTM): The discount rate that equates the present value of all promised future cash flows (coupons and principal) to the current market price of the bond.",
        example: "A 5-year bond with face value $1,000, annual coupon rate of 6%, and YTM of 8%: PV = 60/(1.08) + 60/(1.08)² + 60/(1.08)³ + 60/(1.08)⁴ + 1060/(1.08)⁵ = 55.56 + 51.44 + 47.63 + 44.10 + 721.22 = $920.15. The bond trades at a discount because its coupon (6%) is below the YTM (8%)."

      q2b: {
        body: `Implied return is the discount rate that equates the present value of future cash flows to the current price. For fixed income: solve for r in PV = Σ[CF/(1+r)^t]. For equity: if a stock pays a constant dividend D growing at rate g, the implied return is r = D1/P0 + g (dividend yield + expected growth rate).

The cash flow additivity principle states that dollar amounts of cash flows occurring at the same point in time can be added together. This principle is the foundation for valuing complex instruments by decomposing them into simple components.

Implied forward rates can be derived using cash flow additivity. The forward rate f(1,1) is the rate on a one-year loan beginning one year from now, derived from the one-year spot rate s1 and two-year spot rate s2: (1+s2)² = (1+s1)(1+f(1,1)). This ensures no-arbitrage between investing for 2 years directly versus investing for 1 year then rolling over.

Forward exchange rates are derived from spot exchange rates and interest rate differentials through covered interest rate parity: F/S = (1+rdomestic) / (1+rforeign), where F is the forward exchange rate and S is the spot rate. This relationship ensures no-arbitrage between domestic and foreign investments. Option pricing using cash flow additivity employs replication portfolios to price options, forming the basis for risk-neutral valuation and the binomial model.`,
        note: "The no-arbitrage principle underlies all forward rate calculations. If (1+s2)² ≠ (1+s1)(1+f(1,1)), arbitrage exists. This concept extends to currencies and options. Always verify through replication.",

        example: "Given: 1-year spot rate s1 = 4%, 2-year spot rate s2 = 5%. Implied 1-year forward rate 1 year from now: (1+0.05)² = (1+0.04)(1+f(1,1)) → 1.1025 = 1.04 × (1+f(1,1)) → f(1,1) = 1.1025/1.04 − 1 = 6.01%. An investor is indifferent between a 2-year investment at 5% and a 1-year investment at 4% rolled into another 1-year at 6.01%."

      {q:"How does a bond's price relate to its YTM vs coupon rate?", a:"If coupon rate > YTM → price > par (premium). If coupon rate < YTM → price < par (discount). If coupon rate = YTM → price = par. Bond price and yield move inversely."},

  q3: {
    intro: "Statistical Measures of Asset Returns covers the key descriptive statistics used to summarize financial data, including measures of central tendency, dispersion, shape, and correlation. These tools form the quantitative foundation for portfolio analysis and risk measurement.",
    sections: {
      q3a: {
        body: `A measure of central tendency specifies where data are centered. The arithmetic mean (sample mean) is the most common: X̄ = Σxi/n. While simple to calculate, the arithmetic mean is sensitive to outliers (extreme values), which can distort its representation of a typical return.

The median is the middle value of a sorted dataset (or the average of the two middle values for an even number of observations). It is not affected by extreme values, making it more robust than the mean for skewed distributions. The mode is the most frequently occurring value in a dataset. A distribution can be unimodal (one mode), bimodal (two modes), or multimodal (more than two modes). Modes are commonly used with grouped data.

Dealing with outliers: analysts may use the trimmed mean (removing a specified percentage of extreme observations from both ends before averaging) or the winsorized mean (replacing extreme values with the nearest less-extreme value). These measures reduce the influence of outliers while retaining all data points.

Quantiles divide a distribution into equal parts: quartiles (4 parts), quintiles (5 parts), deciles (10 parts), and percentiles (100 parts). The first quartile (Q1) is the 25th percentile, the median is Q2 or the 50th percentile, and Q3 is the 75th percentile. The interquartile range (IQR = Q3 − Q1) measures the spread of the middle 50% of observations.`,
        note: "For positively skewed distributions: Mode < Median < Mean. For negatively skewed: Mean < Median < Mode. For symmetric distributions they are equal. The median is the preferred measure for skewed data or data with outliers.",
        definition: "Trimmed Mean: The arithmetic mean calculated after removing a stated percentage of the lowest and highest values from a dataset, reducing the influence of extreme observations.",
        example: "Monthly returns dataset (sorted): −8%, −3%, −1%, 2%, 3%, 4%, 5%, 6%, 7%, 15%. Mean = 3.0%. Median = (3+4)/2 = 3.5%. Mode = none (all unique). A 10% trimmed mean removes the lowest (−8%) and highest (15%), leaving 8 values: mean = (−3−1+2+3+4+5+6+7)/8 = 23/8 = 2.875%. The trimmed mean is less influenced by the extreme −8% and 15% values."
      },
      q3b: {
        body: `Measures of dispersion describe the variability or spread of a distribution around its mean. The range is simply the difference between the maximum and minimum values. It is easy to calculate but uses only two data points and is highly sensitive to outliers.

Mean Absolute Deviation (MAD) = Σ|xi − X̄|/n. It measures the average distance of observations from the mean. Since it uses absolute values, it treats positive and negative deviations equally. The sample variance (s²) = Σ(xi − X̄)²/(n−1). The denominator is n−1 (not n) to produce an unbiased estimate of the population variance. The sample standard deviation (s) = √s² and is in the same units as the original data.

Downside deviation (semideviation) measures variability below a target return or mean, which is more relevant for risk-averse investors since they care primarily about losses: semideviation = √[Σ(xi − target)² for xi < target / (n−1)]. The coefficient of variation (CV = s/X̄) measures risk per unit of return, allowing comparison of risk across investments with different mean returns. A lower CV indicates better risk-return efficiency.

Target semideviation focuses on deviations below a specific target return rather than the mean, making it particularly useful for pension funds and liability-driven investors who have specific return requirements.`,
        note: "Use CV to compare risk across assets with different return levels (apples-to-apples comparison). Sample variance uses n−1 (Bessel's correction) to produce an unbiased estimate. Semideviation is more appropriate for non-normal or negatively skewed return distributions.",
        definition: "Coefficient of Variation (CV): The ratio of the standard deviation to the mean (CV = s/X̄), measuring the amount of risk (variability) per unit of expected return; useful for comparing investments with different means.",
        example: "Asset A: mean return 8%, standard deviation 10%. Asset B: mean return 15%, standard deviation 20%. CV(A) = 10/8 = 1.25. CV(B) = 20/15 = 1.33. Despite Asset B having higher absolute return and risk, Asset A has lower risk per unit of return (CV 1.25 < 1.33), making it more efficient on a risk-adjusted basis."
      },
      q3c: {
        body: `Skewness measures the degree of asymmetry of a distribution around its mean. A symmetrical distribution has zero skewness. Positive skewness (right skew) has a long right tail, frequent small losses and a few extreme gains, with Mode < Median < Mean. Negative skewness (left skew) has a long left tail, frequent small gains and a few extreme losses, with Mean < Median < Mode. Many equity return distributions exhibit negative skewness.

Kurtosis measures the combined weight of the tails of a distribution relative to the rest of the distribution (peakedness and tail weight). A normal distribution has kurtosis of 3. Excess kurtosis = Kurtosis − 3. Leptokurtosis (fat tails, excess kurtosis > 0): greater probability of extreme outcomes than normal; common in financial returns. Platykurtosis (thin tails, excess kurtosis < 0): less probability of extreme outcomes.

Correlation between two variables measures the strength and direction of their linear relationship. The correlation coefficient ρ (population) or r (sample) ranges from −1 to +1. r = Cov(X,Y) / (s_X × s_Y). A scatter plot visually displays the relationship between two variables. Positive correlation: both variables tend to move together. Negative correlation: variables tend to move in opposite directions. Zero correlation: no linear relationship.

Limitations of correlation analysis: (1) Correlation measures only linear relationships; (2) Outliers can distort the correlation coefficient significantly; (3) Spurious correlation can exist when two variables appear related due to a third factor or by chance; (4) Correlation does not imply causation.`,
        note: "Investors generally dislike negative skewness (extreme losses) and positive excess kurtosis (fat tails), as both increase the probability of large losses beyond what a normal distribution would predict. These properties explain why variance alone is insufficient as a risk measure.",
        definition: "Kurtosis: A measure of the combined weight of the tails of a probability distribution relative to the rest of the distribution; a normal distribution has kurtosis of 3 (excess kurtosis of 0).",
        example: "Portfolio A: annual returns mostly cluster between −5% and +10%, with occasional years of −25% or +30%. This positive excess kurtosis (leptokurtosis) means the normal distribution underestimates tail risk. A risk model using only mean and variance would underestimate the probability of the −25% outcome, leading to insufficient capital reserves."
      }

      {q:"What is the difference between variance and standard deviation, and why use n−1?", a:"Variance = average squared deviation from mean. Standard deviation = square root of variance (same units as data). Use n−1 (Bessel's correction) in sample variance to produce an unbiased estimate of population variance, correcting for the fact that sample deviations are measured around the sample mean rather than the true population mean."},

      q4a: {
        body: `Expected value is the probability-weighted average of all possible outcomes of a random variable: E(X) = Σ[P(xi) × xi]. For investment returns, it represents the mean return we would expect on average across many trials. The variance of a random variable measures the dispersion around the expected value: Var(X) = E[(X − E(X))²] = Σ[P(xi) × (xi − E(X))²].

Probability trees are diagrams that map out sequences of uncertain events, with each branch representing a possible outcome and its associated probability. They are particularly useful for visualizing conditional probabilities and multi-stage decisions. The probability of any final outcome is the product of the probabilities along the path to that outcome.

        body: `Hypothesis testing is a systematic six-step process for making probability-based decisions about population parameters using sample statistics. Step 1: State the hypotheses. The null hypothesis (H₀) is the statement to be tested — what we want to disprove. The alternative hypothesis (Hₐ) is what we accept if H₀ is rejected. They must be mutually exclusive and collectively exhaustive.

Step 2: Identify the appropriate test statistic. Common test statistics include the t-test (for means when population variance is unknown), z-test (for means when population variance is known or n is large), F-test (for comparing two variances), and chi-square test (for variance of a single population). The test statistic measures how far the sample result is from the null hypothesis value in standard error units.

Step 3: Specify the level of significance (α). This is the probability of rejecting a true null hypothesis (Type I error). Common choices: α = 0.05 (5%) or α = 0.01 (1%). A lower α reduces Type I errors but increases Type II errors (failing to reject a false null). Step 4: State the decision rule. Determine the critical value(s) and rejection region. For a two-tailed test at α = 0.05 with the t-distribution: reject H₀ if |t| > t(α/2, n−1).

For paired (dependent) samples (same subjects measured twice): t = d̄ / (sd/√n), where d̄ is the mean difference and sd is the standard deviation of differences. This is appropriate when comparing before/after measurements or matched pairs.

The chi-square test tests a hypothesis about a single population variance: χ² = (n−1)s²/σ₀². The chi-square distribution is asymmetric and only takes positive values. The nonparametric tests (Mann-Whitney U, Spearman rank correlation, sign test, Wilcoxon signed-rank) are used when data do not satisfy the distributional assumptions of parametric tests or when data are at the ordinal scale.`,

  if(!children)return null;
  const s={note:{bg:t.nBg,bdr:t.nBdr,tx:t.nTxt},def:{bg:t.dBg,bdr:t.dBdr,tx:t.dTxt},ex:{bg:t.eBg,bdr:t.eBdr,tx:t.eTxt}}[type];
  return(<div style={{background:s.bg,borderLeft:`4px solid ${s.bdr}`,borderRadius:"0 8px 8px 0",padding:"14px 20px",marginBottom:22}}><div style={{fontSize:10.5,fontWeight:700,color:s.bdr,letterSpacing:"0.09em",textTransform:"uppercase",marginBottom:7}}>{label}</div><p style={{fontSize:15.5,lineHeight:1.8,color:s.tx,fontFamily:"Georgia,serif",margin:0}}>{children}</p></div>);
}

function QItem({num,q,t}){
  const [open,setOpen]=useState(false);
  const parts=q.split('\n\nAnswer:');const question=parts[0];const answer=parts[1]||"See CFA curriculum for detailed answer.";
  return(<li style={{marginBottom:12,background:t.bg,border:`1px solid ${t.bdr}`,borderRadius:8,padding:"15px 18px",listStyle:"none"}}>
    <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
      <div style={{background:t.acc,color:"#fff",borderRadius:5,width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0,marginTop:1}}>{num}</div>
      <div style={{flex:1}}>
        <p style={{fontSize:15.5,lineHeight:1.72,color:t.txt,fontFamily:"Georgia,serif",marginBottom:11,marginTop:0}}>{question}</p>
        {!open?<button onClick={()=>setOpen(true)} style={{background:"none",border:`1px solid ${t.bdr}`,borderRadius:5,padding:"4px 13px",fontSize:12,color:t.muted,cursor:"pointer"}}>Show answer</button>
        :<div style={{background:t.eBg,borderLeft:`3px solid ${t.eBdr}`,padding:"10px 15px",borderRadius:"0 6px 6px 0",fontSize:14.5,color:t.eTxt,fontFamily:"Georgia,serif"}}><strong>Answer: </strong>{answer.trim()}</div>}
      </div>
    </div>
  </li>);
}

function NavBtn({dir,mod,t,onClick}){
  const [hov,setHov]=useState(false);const isPrev=dir==="prev";
  return(<button onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{flex:1,minWidth:200,background:hov?t.surf:t.bg,border:`1.5px solid ${hov?t.acc:t.bdr}`,borderRadius:9,padding:"15px 20px",cursor:"pointer",textAlign:isPrev?"left":"right",display:"flex",flexDirection:"column",alignItems:isPrev?"flex-start":"flex-end",gap:4,transition:"all 0.15s"}}>
    <span style={{fontSize:11,color:t.lite,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>{isPrev?"← Previous":"Next →"}</span>
    <span style={{fontSize:15,color:t.txt,fontFamily:"Georgia,serif",fontWeight:600,lineHeight:1.3}}>{mod.num} {mod.title}</span>
    <span style={{fontSize:11.5,color:t.muted}}>{mod.subject.title}</span>
  </button>);
}

function App(){
  const [dark,setDark]=useState(()=>Store.get("dark")||false);
  const [activeId,setActiveId]=useState(ALL_MODULES[0].id);
  const [expanded,setExpanded]=useState({quant:true});
  const [sideOpen,setSideOpen]=useState(true);
  const [search,setSearch]=useState("");
  const [completed,setCompleted]=useState(()=>Store.get("completed")||{});
  const [showFC,setShowFC]=useState(false);
  const [sideView,setSideView]=useState("study");
  const mainRef=useRef(null);
  const t=T[dark?"dark":"light"];

  useEffect(()=>Store.set("dark",dark),[dark]);
  useEffect(()=>Store.set("completed",completed),[completed]);

  const activeMod=ALL_MODULES.find(m=>m.id===activeId)||ALL_MODULES[0];
  const activeSubj=activeMod.subject;
  const modData=CONTENT[activeMod.id];
  const intro=modData?.intro||"Content from CFA 2025 Level I curriculum.";
  const sections=activeMod.subs.map(sub=>({...sub,...(modData?.sections?.[sub.id]||{})}));
  const flashcards=modData?.flashcards||[];
  const questions=modData?.questions||[];
  const doneCount=Object.values(completed).filter(Boolean).length;
  const pct=Math.round((doneCount/TOTAL)*100);
  const modIdx=ALL_MODULES.findIndex(m=>m.id===activeId);
  const prev=modIdx>0?ALL_MODULES[modIdx-1]:null;
  const next=modIdx<ALL_MODULES.length-1?ALL_MODULES[modIdx+1]:null;

  const go=(mod)=>{setActiveId(mod.id);setExpanded(e=>({...e,[mod.subject.id]:true}));setSideView("study");setTimeout(()=>{if(mainRef.current)mainRef.current.scrollTop=0;},50);};
  const scrollTo=(id)=>{const el=document.getElementById(id);if(el&&mainRef.current)mainRef.current.scrollTo({top:el.offsetTop-24,behavior:"smooth"});};
  const toggleDone=(id)=>setCompleted(c=>({...c,[id]:!c[id]}));

  const filtered=CURRICULUM.map(s=>({...s,modules:s.modules.filter(m=>search===""||m.title.toLowerCase().includes(search.toLowerCase())||m.subs.some(ss=>ss.title.toLowerCase().includes(search.toLowerCase())))})).filter(s=>s.modules.length>0);

  return(
    <div style={{display:"flex",height:"100vh",background:t.bg,color:t.txt,overflow:"hidden",transition:"background 0.25s"}}>
      {showFC&&<FlashcardModal mod={activeMod} cards={flashcards} t={t} onClose={()=>setShowFC(false)}/>}

      <aside style={{width:sideOpen?280:0,minWidth:sideOpen?280:0,background:t.side,borderRight:`1px solid ${t.bdr}`,display:"flex",flexDirection:"column",overflow:"hidden",transition:"width 0.25s,min-width 0.25s",flexShrink:0}}>
        <div style={{padding:"16px 16px 12px",borderBottom:`1px solid ${t.bdr}`,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <div style={{background:t.acc,color:"#fff",borderRadius:7,width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,flexShrink:0}}>CFA</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:700,color:t.txt,lineHeight:1.25}}>Quantitative Methods</div><div style={{fontSize:11,color:t.lite,marginTop:1}}>CFA Level I · 2025 Curriculum</div></div>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:11,fontWeight:600,color:t.muted}}>Study Progress</span>
              <span style={{fontSize:11,fontWeight:700,color:t.done}}>{pct}% · {doneCount}/{TOTAL}</span>
            </div>
            <div style={{height:5,background:t.bdr,borderRadius:3,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:t.done,borderRadius:3,transition:"width 0.4s"}}/></div>
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search modules…" style={{width:"100%",padding:"7px 10px",borderRadius:6,border:`1px solid ${t.bdr}`,background:t.bg,color:t.txt,fontSize:12,outline:"none"}}/>
        </div>

        <div style={{display:"flex",borderBottom:`1px solid ${t.bdr}`,flexShrink:0}}>
          {["study","progress"].map(v=>(<button key={v} onClick={()=>setSideView(v)} style={{flex:1,padding:"9px",border:"none",background:sideView===v?t.bg:"none",color:sideView===v?t.acc:t.muted,fontSize:12,fontWeight:sideView===v?700:400,cursor:"pointer",borderBottom:sideView===v?`2px solid ${t.acc}`:"2px solid transparent",transition:"all 0.15s"}}>{v==="study"?"📚 Modules":"📊 Progress"}</button>))}
        </div>

        {sideView==="study"&&(
          <nav style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
            {filtered.map(subj=>(
              <div key={subj.id}>
                <button onClick={()=>setExpanded(e=>({...e,[subj.id]:!e[subj.id]}))} style={{width:"100%",textAlign:"left",background:"none",border:"none",cursor:"pointer",padding:"8px 14px",display:"flex",alignItems:"center",gap:6,color:t.muted,fontSize:10.5,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase"}}>
                  <span style={{display:"inline-block",transform:expanded[subj.id]?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.15s",fontSize:9,color:t.lite,flexShrink:0}}>▶</span>
                  <span style={{color:t.acc,marginRight:1,flexShrink:0}}>{subj.num}.</span>
                  <span style={{flex:1,lineHeight:1.3}}>{subj.title}</span>
                  <span style={{fontSize:10,color:t.lite,flexShrink:0}}>{subj.modules.filter(m=>completed[m.id]).length}/{subj.modules.length}</span>
                </button>
                {expanded[subj.id]&&subj.modules.map(mod=>{
                  const isAct=mod.id===activeId;
                  return(<div key={mod.id}>
                    <div style={{display:"flex",alignItems:"center"}}>
                      <button onClick={()=>go({...mod,subject:subj})} style={{flex:1,textAlign:"left",background:isAct?t.atvBg:"none",border:"none",borderLeft:isAct?`3px solid ${t.acc}`:"3px solid transparent",cursor:"pointer",padding:"7px 8px 7px 24px",color:isAct?t.atvTxt:t.txt,fontSize:12.5,fontWeight:isAct?600:400,lineHeight:1.4,transition:"background 0.1s"}}>
                        <span style={{color:isAct?t.acc:t.lite,fontSize:11,marginRight:5}}>{mod.num}</span>{mod.title}
                      </button>
                      <button onClick={()=>toggleDone(mod.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"7px 10px 7px 4px",color:completed[mod.id]?t.done:t.lite,fontSize:15,flexShrink:0}}>{completed[mod.id]?"✓":"○"}</button>
                    </div>
                    {isAct&&mod.subs.map(sub=>(<button key={sub.id} onClick={()=>scrollTo(sub.id)} style={{width:"100%",textAlign:"left",background:"none",border:"none",cursor:"pointer",padding:"3px 14px 3px 40px",color:t.muted,fontSize:11.5,lineHeight:1.5}}><span style={{color:t.lite,marginRight:5,fontSize:10}}>{sub.num}</span>{sub.title}</button>))}
                  </div>);
                })}
              </div>
            ))}
          </nav>
        )}

        {sideView==="progress"&&(
          <div style={{flex:1,overflowY:"auto",padding:"14px"}}>
            <div style={{background:t.surf,borderRadius:10,padding:"16px",textAlign:"center",marginBottom:14}}>
              <div style={{fontSize:34,fontWeight:800,color:t.done}}>{pct}%</div>
              <div style={{fontSize:12,color:t.muted,marginTop:2}}>{doneCount} of {TOTAL} modules complete</div>
              <div style={{height:6,background:t.bdr,borderRadius:3,overflow:"hidden",marginTop:10}}><div style={{width:`${pct}%`,height:"100%",background:t.done,borderRadius:3}}/></div>
            </div>
            {CURRICULUM[0].modules.map(m=>(<div key={m.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:11.5,color:t.txt,fontWeight:500}}>{m.num} {m.title}</span><span style={{fontSize:11,color:completed[m.id]?t.done:t.muted,fontWeight:600}}>{completed[m.id]?"✓":"—"}</span></div>
              <div style={{height:4,background:t.bdr,borderRadius:2,overflow:"hidden"}}><div style={{width:completed[m.id]?"100%":"0%",height:"100%",background:t.done,borderRadius:2,transition:"width 0.4s"}}/></div>
            </div>))}
            <button onClick={()=>{setCompleted({});Store.del("completed");}} style={{width:"100%",marginTop:10,padding:"8px",borderRadius:7,border:`1px solid ${t.bdr}`,background:"none",color:t.muted,fontSize:12,cursor:"pointer"}}>Reset all progress</button>
          </div>
        )}
        <div style={{padding:"10px 14px",borderTop:`1px solid ${t.bdr}`,fontSize:11,color:t.lite,flexShrink:0}}>© CFA Institute · Level I 2025</div>
      </aside>

      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <header style={{height:52,borderBottom:`1px solid ${t.bdr}`,display:"flex",alignItems:"center",padding:"0 18px",gap:10,background:t.bg,flexShrink:0}}>
          <button onClick={()=>setSideOpen(o=>!o)} style={{background:"none",border:`1px solid ${t.bdr}`,borderRadius:5,padding:"4px 9px",cursor:"pointer",color:t.muted,fontSize:16,lineHeight:1}}>☰</button>
          <nav style={{flex:1,fontSize:12.5,color:t.muted,display:"flex",alignItems:"center",gap:7,overflow:"hidden",minWidth:0}}>
            <span style={{color:t.acc,fontWeight:700,whiteSpace:"nowrap"}}>CFA Level I</span>
            <span style={{color:t.bdr,fontSize:14,flexShrink:0}}>›</span>
            <span style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{activeSubj.title}</span>
            <span style={{color:t.bdr,fontSize:14,flexShrink:0}}>›</span>
            <span style={{color:t.txt,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{activeMod.title}</span>
          </nav>
          <div style={{display:"flex",gap:7,flexShrink:0}}>
            <button onClick={()=>setShowFC(true)} style={{background:t.fcBg,border:`1.5px solid ${t.fc}`,borderRadius:7,padding:"5px 11px",cursor:"pointer",color:t.fc,fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>🃏 {flashcards.length>0?flashcards.length:""}</button>
            <button onClick={()=>toggleDone(activeMod.id)} style={{background:completed[activeMod.id]?t.doneBg:t.surf,border:`1.5px solid ${completed[activeMod.id]?t.done:t.bdr}`,borderRadius:7,padding:"5px 11px",cursor:"pointer",color:completed[activeMod.id]?t.done:t.muted,fontSize:12,fontWeight:700,whiteSpace:"nowrap",transition:"all 0.2s"}}>{completed[activeMod.id]?"✓ Done":"○ Mark Done"}</button>
            <button onClick={()=>setDark(d=>!d)} style={{background:t.surf,border:`1px solid ${t.bdr}`,borderRadius:20,padding:"5px 13px",cursor:"pointer",color:t.txt,fontSize:12,fontWeight:600}}>{dark?"☀":"☾"}</button>
          </div>
        </header>

        <main ref={mainRef} style={{flex:1,overflowY:"auto"}}>
          <article style={{maxWidth:768,margin:"0 auto",padding:"52px 36px 100px"}}>
            {completed[activeMod.id]&&(<div style={{background:t.doneBg,border:`1.5px solid ${t.done}`,borderRadius:9,padding:"12px 18px",marginBottom:28,display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:20}}>✅</span><span style={{fontSize:13.5,color:t.done,fontWeight:600}}>Module marked as complete!</span></div>)}
            <div style={{marginBottom:36}}>
              <div style={{fontSize:11,fontWeight:700,color:t.acc,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>{activeSubj.num} · {activeSubj.title}</div>
              <h1 style={{fontFamily:"Georgia,serif",fontSize:"clamp(26px,3.5vw,40px)",fontWeight:600,lineHeight:1.16,color:t.txt,marginBottom:18,letterSpacing:"-0.3px"}}>{activeMod.num}&nbsp;&nbsp;{activeMod.title}</h1>
              <p style={{fontSize:17,lineHeight:1.85,color:t.muted,fontFamily:"Georgia,serif",margin:0}}>{intro}</p>
            </div>
            {flashcards.length>0&&(<div style={{background:t.fcBg,border:`1px solid ${t.fc}`,borderRadius:9,padding:"14px 18px",marginBottom:32,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
              <div><div style={{fontSize:12,fontWeight:700,color:t.fc,marginBottom:2}}>🃏 {flashcards.length} Flashcards — from 2025 CFA curriculum</div><div style={{fontSize:12.5,color:t.muted}}>Reinforce key concepts with active recall.</div></div>
              <button onClick={()=>setShowFC(true)} style={{background:t.fc,color:"#fff",border:"none",borderRadius:7,padding:"8px 18px",cursor:"pointer",fontSize:13,fontWeight:700,whiteSpace:"nowrap"}}>Start Deck →</button>
            </div>)}
            <div style={{background:t.surf,border:`1px solid ${t.bdr}`,borderRadius:9,padding:"16px 22px",marginBottom:44}}>
              <div style={{fontSize:10.5,fontWeight:700,color:t.lite,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:11}}>In this module</div>
              {sections.map(sec=>(<button key={sec.id} onClick={()=>scrollTo(sec.id)} style={{display:"block",background:"none",border:"none",cursor:"pointer",textAlign:"left",padding:"3px 0",color:t.link,fontSize:13.5,lineHeight:1.55}}><span style={{color:t.lite,marginRight:8,fontSize:11}}>{sec.num}</span>{sec.title}</button>))}
              <button onClick={()=>scrollTo(`q-${activeMod.id}`)} style={{display:"block",background:"none",border:"none",cursor:"pointer",textAlign:"left",padding:"4px 0 0",color:t.link,fontSize:13.5,borderTop:`1px solid ${t.bdr}`,marginTop:8,width:"100%"}}><span style={{color:t.lite,marginRight:8}}>✎</span>Practice Questions</button>
            </div>
            <hr style={{border:"none",borderTop:`1px solid ${t.bdr}`,marginBottom:44}}/>
            {sections.map(sec=>(<section key={sec.id} id={sec.id} style={{marginBottom:58,scrollMarginTop:24}}>
              <h2 style={{fontFamily:"Georgia,serif",fontSize:25,fontWeight:600,color:t.txt,marginBottom:22,paddingBottom:11,borderBottom:`1px solid ${t.bdr}`,display:"flex",alignItems:"baseline",gap:11,marginTop:0}}>
                <span style={{color:t.acc,fontSize:18,fontWeight:700,flexShrink:0}}>{sec.num}</span>{sec.title}
              </h2>
              <Callout type="note" t={t} label="📌 Exam Note">{sec.note}</Callout>
              <Callout type="def" t={t} label="📖 Key Definition">{sec.definition}</Callout>
              <div style={{marginBottom:22}}>{(sec.body||"").split("\n\n").map((p,pi)=>(<p key={pi} style={{fontSize:16.5,lineHeight:1.9,color:t.txt,fontFamily:"Georgia,serif",marginBottom:16,marginTop:0}}>{p}</p>))}</div>
              <Callout type="ex" t={t} label="💡 Worked Example">{sec.example}</Callout>
            </section>))}
            <section id={`q-${activeMod.id}`} style={{background:t.qBg,border:`1px solid ${t.qBdr}`,borderRadius:10,padding:"28px 28px 22px",marginTop:8}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,flexWrap:"wrap"}}>
                <span style={{background:t.qBdr,color:"#fff",borderRadius:5,padding:"3px 11px",fontSize:10.5,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase"}}>Practice</span>
                <h3 style={{fontFamily:"Georgia,serif",fontSize:21,fontWeight:600,color:t.txt,margin:0}}>End of Module Questions</h3>
              </div>
              <p style={{fontSize:13.5,color:t.muted,marginBottom:22,lineHeight:1.65,marginTop:4}}>CFA-style practice questions based on 2025 curriculum. Click "Show answer" to reveal.</p>
              <ol style={{padding:0,margin:0}}>{questions.map((q,qi)=>(<QItem key={qi} num={qi+1} q={q} t={t}/>))}</ol>
            </section>
            <div style={{marginTop:32,textAlign:"center"}}>
              <button onClick={()=>toggleDone(activeMod.id)} style={{background:completed[activeMod.id]?t.doneBg:t.surf,border:`1.5px solid ${completed[activeMod.id]?t.done:t.bdr}`,borderRadius:8,padding:"11px 28px",cursor:"pointer",color:completed[activeMod.id]?t.done:t.muted,fontSize:14,fontWeight:700,transition:"all 0.2s"}}>{completed[activeMod.id]?"✓ Module Complete — click to undo":"○ Mark this module as complete"}</button>
            </div>
            <div style={{display:"flex",gap:16,marginTop:30,flexWrap:"wrap"}}>
              {prev?<NavBtn dir="prev" mod={prev} t={t} onClick={()=>go(prev)}/>:<div style={{flex:1}}/>}
              {next&&<NavBtn dir="next" mod={next} t={t} onClick={()=>go(next)}/>}
            </div>
          </article>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
